        .then(r => r.json())
        .then(data => setGiphyResults(data.data || []))
        .catch(() => {});
      return;
    }
    gifSearchTimeout.current = setTimeout(() => {
      setGiphyLoading(true);
      fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_API_KEY}&q=${encodeURIComponent(gifSearch)}&limit=12&rating=g`)
        .then(r => r.json())
        .then(data => { setGiphyResults(data.data || []); setGiphyLoading(false); })
        .catch(() => setGiphyLoading(false));
    }, 400);
    return () => clearTimeout(gifSearchTimeout.current);
  }, [gifSearch, showGifPicker]);

  const closeAllPickers = () => { setShowEmojiPicker(false); setShowGifPicker(false); setShowMentionPicker(false); setShowAttachMenu(false); setGifSearch(''); setGiphyResults([]); };
  const togglePicker = (picker) => {
    const wasOpen = picker === 'emoji' ? showEmojiPicker : picker === 'gif' ? showGifPicker : showMentionPicker;
    closeAllPickers();
    if (!wasOpen) {
      if (picker === 'emoji') setShowEmojiPicker(true);
      else if (picker === 'gif') setShowGifPicker(true);
      else if (picker === 'mention') setShowMentionPicker(true);
    }
  };
  const savedSelection = useRef(null);

  // Save cursor position whenever composer is focused
  const saveSelection = () => {
    const sel = window.getSelection();
    if (sel.rangeCount > 0 && composerRef.current?.contains(sel.anchorNode)) {
      savedSelection.current = sel.getRangeAt(0).cloneRange();
    }
  };

  const insertEmoji = (emoji) => {
    const el = composerRef.current;
    if (!el) return;
    el.focus();
    // Restore saved selection if available
    if (savedSelection.current) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(savedSelection.current);
    }
    // Try execCommand first, fall back to appending
    if (!document.execCommand('insertText', false, emoji)) {
      el.textContent += emoji;
    }
    // Save new position
    saveSelection();
    setShowEmojiPicker(false);
  };
  const insertGif = (gif) => {
    if (!activeChannel || !authedUser) return;
    const gifUrl = gif.images?.fixed_height?.url || gif.images?.original?.url || '';
    const gifTitle = gif.title || '';
    db.collection('channels').doc(activeChannel).collection('messages').add({
      userId: authedUser.id,
      text: '',
      gif: { url: gifUrl, title: gifTitle, id: gif.id },
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      reactions: [],
    });
    setShowGifPicker(false);
    setGifSearch('');
    setGiphyResults([]);
  };
  const insertMention = (emp) => {
    composerRef.current?.focus();
    document.execCommand('insertHTML', false, `<span class="tag">@${emp.name}</span>&nbsp;`);
    setShowMentionPicker(false);
  };
  const execFormat = (command, value) => {
    composerRef.current?.focus();
    document.execCommand(command, false, value || null);
    updateActiveFormats();
  };
  const toggleTitle = () => {
    composerRef.current?.focus();
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    // Check if already in a heading
    let node = sel.anchorNode;
    let inHeading = false;
    while (node && node !== composerRef.current) {
      if (node.nodeName === 'H3') { inHeading = true; break; }
      node = node.parentNode;
    }
    if (inHeading) {
      document.execCommand('formatBlock', false, 'div');
    } else {
      document.execCommand('formatBlock', false, 'h3');
    }
    updateActiveFormats();
  };
  const updateActiveFormats = () => {
    setActiveFormats({
      bold: document.queryCommandState('bold'),
      italic: document.queryCommandState('italic'),
      underline: document.queryCommandState('underline'),
    });
  };
  const getFileIcon = (name) => {
    const ext = name.split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','gif','webp','svg','heic'].includes(ext)) return { icon: 'fa-file-image', color: '#7c6f64' };
    if (['pdf'].includes(ext)) return { icon: 'fa-file-pdf', color: '#b85c4a' };
    if (['doc','docx'].includes(ext)) return { icon: 'fa-file-word', color: '#2d6a4f' };
    if (['xls','xlsx','csv'].includes(ext)) return { icon: 'fa-file-excel', color: '#40916c' };
    if (['mp4','mov','avi','webm'].includes(ext)) return { icon: 'fa-file-video', color: '#6d597a' };
    if (['mp3','wav','m4a'].includes(ext)) return { icon: 'fa-file-audio', color: '#b56576' };
    if (['zip','rar','7z'].includes(ext)) return { icon: 'fa-file-zipper', color: '#8d6e63' };
    return { icon: 'fa-file', color: '#78909c' };
  };
  const formatFileSize = (bytes) => {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  };
  const handleFileAttach = (accept) => {
    if (fileInputRef.current) {
      fileInputRef.current.accept = accept || '';
      fileInputRef.current.click();
    }
  };
  const onFileSelected = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    e.target.value = '';
    const { icon, color } = getFileIcon(file.name);
    // For images, create a preview
    let preview = null;
    if (file.type.startsWith('image/')) {
      preview = URL.createObjectURL(file);
    }
    setAttachedFile({ name: file.name, size: formatFileSize(file.size), icon, color, file, preview, uploading: false, url: null });
  };
  const uploadAndSendFile = async (fileObj) => {
    if (!fileObj?.file || !activeChannel || !authedUser) return null;
    setUploadingFile(true);
    try {
      const ts = Date.now();
      const safeName = fileObj.file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = `chat-files/${activeChannel}/${ts}_${safeName}`;
      const ref = storage.ref(path);
      await ref.put(fileObj.file);
      const url = await ref.getDownloadURL();
      setUploadingFile(false);
      return { name: fileObj.name, size: fileObj.size, url, type: fileObj.file.type, path };
    } catch (err) {
      console.error('File upload failed:', err);
      setUploadingFile(false);
      return null;
    }
  };

  const QUICK_REACTS = ['👍','❤️','😂','🎉','🔥','👀'];

  const applyReactionToggle = (reactions) => {
    reactions = [...(reactions || [])];
    return (emoji) => {
      const existing = reactions.findIndex(r => r.emoji === emoji);
      if (existing >= 0) {
        const r = { ...reactions[existing] };
        if (r.myReact) {
          r.count = r.count - 1;
          r.myReact = false;
          if (r.count <= 0) { reactions.splice(existing, 1); } else { reactions[existing] = r; }
        } else {
          r.count = r.count + 1;
          r.myReact = true;
          reactions[existing] = r;
        }
      } else {
        reactions.push({ emoji, count: 1, myReact: true });
      }
      return reactions;
    };
  };

  const toggleReaction = (channelId, msgId, emoji, isReply, parentMsgId) => {
    if (!channelId) return;
    const msgRef = db.collection('channels').doc(channelId).collection('messages').doc(isReply && parentMsgId ? parentMsgId : msgId);
    msgRef.get().then(doc => {
      if (!doc.exists) return;
      const data = doc.data();
      let reactions;
      if (isReply && parentMsgId) {
        const replies = [...(data.replies || [])];
        const rIdx = replies.findIndex(r => r.id === msgId);
        if (rIdx === -1) return;
        replies[rIdx] = { ...replies[rIdx], reactions: applyReactionToggle(replies[rIdx].reactions || [])(emoji) };
        msgRef.update({ replies });
      } else {
        reactions = applyReactionToggle(data.reactions || [])(emoji);
        msgRef.update({ reactions });
      }
    });
  };

  const uid = authedUser?.id;
  const channel = channels.find(c => c.id === activeChannel);
  const isJoined = (ch) => ch.joinedBy && ch.joinedBy.includes(uid);
  const joinedPublic = channels.filter(c => c.visibility === 'public' && isJoined(c));
  const privateChannels = channels.filter(c => c.visibility === 'private' && isJoined(c));
  const dmChannels = channels.filter(c => c.visibility === 'dm' && isJoined(c));

  // For DMs, show the OTHER person's name, not your own
  const getDmName = (ch) => {
    if (ch.visibility !== 'dm') return ch.name;
    // Find the other member's ID
    const otherId = (ch.members || []).find(id => id !== uid) || ch.empId;
    if (!otherId || otherId === uid) return ch.name; // fallback
    const otherEmp = EMPLOYEES.find(e => e.id === otherId);
    return otherEmp?.name || ch.name;
  };
  const getDmEmp = (ch) => {
    if (ch.visibility !== 'dm') return null;
    const otherId = (ch.members || []).find(id => id !== uid) || ch.empId;
    return EMPLOYEES.find(e => e.id === otherId) || null;
  };
  const browsableChannels = channels.filter(c => c.visibility === 'public');

  // Get the parent message for the open thread
  const threadParent = openThread
    ? channelMessages.find(m => m.id === openThread.msgId)
    : null;

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [activeChannel, channelMessages]);

  useEffect(() => {
    threadEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [openThread, channelMessages]);

  // Close pickers on click outside
  useEffect(() => {
    const handleClickOutside = (e) => {
      if (!e.target.closest('.picker-popup') && !e.target.closest('.attach-menu') && !e.target.closest('.composer-toolbar') && !e.target.closest('.msg-reactions') && !e.target.closest('.msg-hover-actions') && !e.target.closest('.more-menu') && !e.target.closest('.msg-edit-wrap')) {
        closeAllPickers();
        setQuickReactMsg(null);
        setMoreMenuMsg(null);
      }
    };
    document.addEventListener('mousedown', handleClickOutside);
    return () => document.removeEventListener('mousedown', handleClickOutside);
  }, []);

  const sendMessage = async () => {
    const editorEl = composerRef.current;
    const html = editorEl ? editorEl.innerHTML : '';
    const text = editorEl ? editorEl.textContent.trim() : '';
    if ((!text && !attachedFile) || !activeChannel || !authedUser) return;
    const msgData = {
      userId: authedUser.id,
      text: html,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      reactions: [],
    };
    if (attachedFile) {
      if (attachedFile.file) {
        const uploaded = await uploadAndSendFile(attachedFile);
        if (uploaded) {
          msgData.file = uploaded;
        } else {
          return; // upload failed
        }
      } else {
        msgData.file = { name: attachedFile.name, size: attachedFile.size };
      }
    }
    db.collection('channels').doc(activeChannel).collection('messages').add(msgData);
    if (editorEl) editorEl.innerHTML = '';
    setMessage('');
    setAttachedFile(null);
    setActiveFormats({});
    closeAllPickers();
  };

  const sendThreadReply = () => {
    if (!threadReply.trim() || !openThread || !authedUser) return;
    const msgRef = db.collection('channels').doc(openThread.channelId).collection('messages').doc(openThread.msgId);
    msgRef.update({
      replies: firebase.firestore.FieldValue.arrayUnion({
        id: Date.now().toString(),
        userId: authedUser.id,
        text: threadReply,
        time: 'Just now',
        createdAt: new Date().toISOString(),
      })
    });
    setThreadReply('');
  };

  const sendPoll = () => {
    if (!pollQuestion.trim() || pollOptions.filter(o => o.trim()).length < 2 || !activeChannel || !authedUser) return;
    db.collection('channels').doc(activeChannel).collection('messages').add({
      userId: authedUser.id,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      reactions: [],
      poll: { question: pollQuestion, options: pollOptions.filter(o => o.trim()).map(o => ({ text: o, votes: 0 })), totalVotes: 0 }
    });
    setShowPollModal(false);
    setPollQuestion('');
    setPollOptions(['', '']);
  };

  const joinChannel = (id) => {
    if (!uid) return;
    db.collection('channels').doc(id).update({
      joinedBy: firebase.firestore.FieldValue.arrayUnion(uid)
    });
    setActiveChannel(id);
    setShowBrowseChannels(false);
    setMobileShowMessages(true);
  };

  const leaveChannel = (id) => {
    if (!uid) return;
    db.collection('channels').doc(id).update({
      joinedBy: firebase.firestore.FieldValue.arrayRemove(uid)
    });
    if (activeChannel === id && channels.length > 0) {
      const next = channels.find(c => c.id !== id);
      setActiveChannel(next ? next.id : null);
    }
  };

  const createChannel = async () => {
    if (!newChannelName.trim() || !uid) return;
    const docRef = await db.collection('channels').add({
      name: newChannelName.toLowerCase().replace(/\s+/g, '-'),
      visibility: newChannelVisibility,
      description: newChannelDesc,
      members: [],
      joinedBy: [uid],
      createdBy: uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    setShowCreateChannel(false);
    setNewChannelName('');
    setNewChannelDesc('');
    setNewChannelVisibility('public');
    setActiveChannel(docRef.id);
    setMobileShowMessages(true);
  };

  const toggleSection = (section) => {
    setSidebarCollapsed({ ...sidebarCollapsed, [section]: !sidebarCollapsed[section] });
  };

  // Message actions state
  const [moreMenuMsg, setMoreMenuMsg] = useState(null);
  const [confirmUnsend, setConfirmUnsend] = useState(null); // { channelId, msgId, parentMsgId }
  const [editingMsg, setEditingMsg] = useState(null);
  const [editText, setEditText] = useState('');

  const unsendMessage = (channelId, msgId, parentMsgId) => {
    if (!channelId) return;
    if (parentMsgId != null) {
      // Remove reply from parent's replies array
      const parentMsg = channelMessages.find(m => m.id === parentMsgId);
      if (parentMsg) {
        const updatedReplies = (parentMsg.replies || []).filter(r => r.id !== msgId);
        db.collection('channels').doc(channelId).collection('messages').doc(parentMsgId).update({ replies: updatedReplies });
      }
    } else {
      db.collection('channels').doc(channelId).collection('messages').doc(msgId).delete();
    }
    setMoreMenuMsg(null);
  };

  const startEdit = (channelId, msg, parentMsgId) => {
    // Strip HTML tags to get plain text for editing
    const plainText = msg.text.replace(/<br\s*\/?>/gi, '\n').replace(/<[^>]+>/g, '');
    setEditingMsg({ channelId, msgId: msg.id, parentMsgId });
    setEditText(plainText);
    setMoreMenuMsg(null);
  };

  const saveEdit = async () => {
    if (!editingMsg || !editText.trim()) return;
    const { channelId, msgId, parentMsgId } = editingMsg;
    const newText = editText.replace(/\n/g, '<br>');
    try {
      if (parentMsgId != null) {
        const parentMsg = channelMessages.find(m => m.id === parentMsgId);
        if (parentMsg) {
          const replies = [...(parentMsg.replies || [])];
          const rIdx = replies.findIndex(r => r.id === msgId);
          if (rIdx >= 0) replies[rIdx] = { ...replies[rIdx], text: newText, edited: true };
          await db.collection('channels').doc(channelId).collection('messages').doc(parentMsgId).update({ replies });
        }
      } else {
        await db.collection('channels').doc(channelId).collection('messages').doc(msgId).update({ text: newText, edited: true });
      }
      setEditingMsg(null);
      setEditText('');
    } catch (err) {
      console.error('Edit save failed:', err);
      alert('Could not save edit. Please try again.');
    }
  };

  const cancelEdit = () => { setEditingMsg(null); setEditText(''); };

  // Render a single message bubble (reused in main feed + thread panel)
  const [quickReactMsg, setQuickReactMsg] = useState(null);
  const [reactPickerTab, setReactPickerTab] = useState('favorites');
  const [reactPickerSearch, setReactPickerSearch] = useState('');

  const MessageBubble = ({ msg, compact, showThreadPreview, chId, parentMsgId }) => {
    const emp = EMPLOYEES.find(e => e.id === msg.userId);
    const fallbackEmp = { name: 'Unknown', avatar: '?', color: '#999' };
    const msgUser = emp || fallbackEmp;
    const replies = msg.replies || [];
    const replyUsers = [...new Set(replies.map(r => r.userId))].map(ruid => EMPLOYEES.find(e => e.id === ruid)).filter(Boolean);
    const lastReply = replies.length > 0 ? replies[replies.length - 1] : null;
    const isThreadOpen = openThread && openThread.channelId === activeChannel && openThread.msgId === msg.id;
    const isOwnMsg = msg.userId === uid;
    const isEditing = editingMsg && editingMsg.msgId === msg.id && editingMsg.channelId === (chId || activeChannel);
    const moreOpen = moreMenuMsg === msg.id;

    return (
      <div className="message-group" key={msg.id}>
        <div className="msg-avatar" style={{ background: msgUser.color, borderRadius: 8, width: compact ? 28 : 36, height: compact ? 28 : 36, fontSize: compact ? 11 : 14 }}>{msgUser.avatar}</div>
        <div className="msg-content">
          <div className="msg-header">
            <span className="msg-name" style={compact ? { fontSize: 13 } : {}}>{msgUser.name}</span>
            <span className="msg-time">{msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : (msg.time || 'Just now')}{msg.edited && <span className="msg-edited">(edited)</span>}</span>
            {!compact && (
              <div className={`msg-hover-actions mobile-show`} style={{ position: 'relative', ...(moreOpen ? { display: 'inline-flex', alignItems: 'center', gap: 2 } : {}) }}>
                <button className="mobile-hide" title="Reply in thread" onClick={() => { closeAllPickers(); setOpenThread({ channelId: activeChannel, msgId: msg.id }); }}><i className="fas fa-comment-dots" /></button>
                <button className="mobile-hide" title="React" onClick={() => setQuickReactMsg(quickReactMsg === msg.id ? null : msg.id)}><i className="fas fa-smile" /></button>
                <button className="mobile-hide" title="Pin"><i className="fas fa-thumbtack" /></button>
                <button title="More" onClick={() => setMoreMenuMsg(moreOpen ? null : msg.id)}><i className="fas fa-ellipsis-h" /></button>
                {moreOpen && ReactDOM.createPortal(<>
                  <div style={{ position: 'fixed', inset: 0, zIndex: 299 }} onClick={() => { setMoreMenuMsg(null); setConfirmUnsend(null); }} />
                  <div className="more-menu">
                    <div style={{ textAlign: 'center', marginBottom: 4 }} className="mobile-only">
                      <div style={{ width: 32, height: 4, background: 'var(--border)', borderRadius: 2, margin: '0 auto' }} />
                    </div>
                    {confirmUnsend && confirmUnsend.msgId === msg.id ? (<>
                      <div style={{ padding: '8px 12px', fontSize: 13, fontWeight: 600, color: 'var(--danger)' }}>Are you sure you want to unsend?</div>
                      <div className="more-menu-item danger" onClick={(e) => { e.stopPropagation(); unsendMessage(confirmUnsend.channelId, confirmUnsend.msgId, confirmUnsend.parentMsgId); setConfirmUnsend(null); }}><i className="fas fa-trash-alt" /> Yes, unsend</div>
                      <div className="more-menu-item" onClick={(e) => { e.stopPropagation(); setConfirmUnsend(null); setMoreMenuMsg(null); }}><i className="fas fa-times" /> Cancel</div>
                    </>) : (<>
                      {isOwnMsg && <div className="more-menu-item" onClick={(e) => { e.stopPropagation(); startEdit(chId || activeChannel, msg, parentMsgId); }}><i className="fas fa-pen" /> Edit message</div>}
                      <div className="more-menu-item" onClick={(e) => { e.stopPropagation(); navigator.clipboard?.writeText(msg.text.replace(/<[^>]+>/g, '')); setMoreMenuMsg(null); }}><i className="fas fa-copy" /> Copy text</div>
                      <div className="more-menu-item" onClick={(e) => { e.stopPropagation(); closeAllPickers(); setMoreMenuMsg(null); setOpenThread({ channelId: activeChannel, msgId: msg.id }); }}><i className="fas fa-comment-dots" /> Reply in thread</div>
                      <div className="more-menu-item"><i className="fas fa-thumbtack" /> Pin message</div>
                      {isOwnMsg && <div className="more-menu-item danger" onClick={(e) => { e.stopPropagation(); setConfirmUnsend({ channelId: chId || activeChannel, msgId: msg.id, parentMsgId }); }}><i className="fas fa-trash-alt" /> Unsend</div>}
                    </>)}
                  </div>
                </>, document.body)}
              </div>
            )}
          </div>
          {isEditing ? (
            <div className="msg-edit-wrap">
              <textarea className="msg-edit-input" value={editText} onChange={e => setEditText(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveEdit(); } if (e.key === 'Escape') cancelEdit(); }}
                ref={el => { if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 200); } }}
                rows={Math.min(Math.max(2, (editText.match(/\n/g) || []).length + 1), 6)} />
              <div className="msg-edit-actions">
                <button onMouseDown={(e) => { e.stopPropagation(); }} onTouchEnd={(e) => { e.preventDefault(); cancelEdit(); }} onClick={cancelEdit}>Cancel</button>
                <button className="primary" onMouseDown={(e) => { e.stopPropagation(); }} onTouchEnd={(e) => { e.preventDefault(); saveEdit(); }} onClick={saveEdit}>Save</button>
              </div>
            </div>
          ) : msg.text ? (
            <div className="msg-text" style={compact ? { fontSize: 13 } : {}} dangerouslySetInnerHTML={{
              __html: msg.text
                .replace(/\n/g, '<br>')
                .replace(/@(\w+\s\w+)/g, '<span class="tag">@$1</span>')
            }} />
          ) : null}
          {msg.file && (
            msg.file.type && msg.file.type.startsWith('image/') && msg.file.url ? (
              <div style={{ marginTop: 6 }}>
                <a href={msg.file.url} target="_blank" rel="noopener noreferrer">
                  <img src={msg.file.url} alt={msg.file.name} style={{ maxWidth: 320, maxHeight: 240, borderRadius: 8, cursor: 'pointer' }} />
                </a>
                <div style={{ fontSize: 11, color: 'var(--text-light)', marginTop: 2 }}>{msg.file.name} · {msg.file.size}</div>
              </div>
            ) : (
              <a href={msg.file.url || '#'} target="_blank" rel="noopener noreferrer" style={{ textDecoration: 'none', color: 'inherit' }}>
                <div className="msg-file">
                  <i className={`fas ${msg.file.url ? 'fa-download' : 'fa-file'}`} />
                  <div className="msg-file-info">
                    <div className="file-name">{msg.file.name}</div>
                    <div className="file-size">{msg.file.size}</div>
                  </div>
                </div>
              </a>
            )
          )}
          {msg.gif && (
            <div style={{ marginTop: 6 }}>
              <img src={msg.gif.url} alt={msg.gif.title || 'GIF'} style={{ maxWidth: 280, maxHeight: 200, borderRadius: 8 }} />
              <div style={{ fontSize: 9, color: 'var(--text-light)', marginTop: 2 }}>via GIPHY</div>
            </div>
          )}
          {msg.poll && (
            <div className="msg-poll">
              <h4><i className="fas fa-poll" style={{ marginRight: 6 }} />{msg.poll.question}</h4>
              {msg.poll.options.map((opt, i) => {
                const pct = msg.poll.totalVotes > 0 ? (opt.votes / msg.poll.totalVotes * 100) : 0;
                return (
                  <div className="poll-option" key={i}>
                    <div className="poll-bar" style={{ width: `${pct}%` }} />
                    <span>{opt.text}</span>
                    <span style={{ marginLeft: 'auto', fontSize: 12, color: 'var(--text-light)' }}>{opt.votes} votes ({Math.round(pct)}%)</span>
                  </div>
                );
              })}
              <div className="poll-votes">{msg.poll.totalVotes} total votes</div>
            </div>
          )}
          {msg.reactions && msg.reactions.length > 0 && (
            <div className="msg-reactions">
              {msg.reactions.map((r, i) => (
                <span className="reaction" key={i} onClick={() => toggleReaction(chId || activeChannel, msg.id, r.emoji, !!parentMsgId, parentMsgId)} style={r.myReact ? { background: '#dceee4', borderColor: 'var(--primary)' } : {}}>{r.emoji} {r.count}</span>
              ))}
              <span className="reaction" style={{ opacity: 0.4, fontSize: 11 }} onClick={() => { setQuickReactMsg(quickReactMsg === msg.id ? null : msg.id); setReactPickerTab('favorites'); setReactPickerSearch(''); }}>+</span>
              {quickReactMsg === msg.id && (
                <div className="picker-popup" style={{ width: 340, position: 'absolute', bottom: '100%', left: 0, marginBottom: 4 }}>
                  <div className="picker-search" style={{ borderBottom: '1px solid var(--border)' }}>
                    <input placeholder="Search emojis..." value={reactPickerSearch} onChange={e => setReactPickerSearch(e.target.value)} />
                  </div>
                  <div className="picker-grid">
                    <div className="picker-cat-section">
                      <div className="emoji-cat-label">Favorites</div>
                      <div className="emoji-row">
                        {EMOJI_FAVORITES.filter(e => !reactPickerSearch || e.includes(reactPickerSearch)).map((e, i) => (
                          <button key={i} className="emoji-btn" onClick={() => { toggleReaction(chId || activeChannel, msg.id, e, !!parentMsgId, parentMsgId); setQuickReactMsg(null); }}>{e}</button>
                        ))}
                      </div>
                    </div>
                    {Object.entries(EMOJI_CATEGORIES).map(([cat, emojis]) => {
                      const filtered = emojis.filter(e => !reactPickerSearch || e.includes(reactPickerSearch));
                      if (filtered.length === 0) return null;
                      return (
                        <div key={cat} className="picker-cat-section">
                          <div className="emoji-cat-label">{cat}</div>
                          <div className="emoji-row">
                            {filtered.map((e, i) => (
                              <button key={i} className="emoji-btn" onClick={() => { toggleReaction(chId || activeChannel, msg.id, e, !!parentMsgId, parentMsgId); setQuickReactMsg(null); }}>{e}</button>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}
          {/* Thread reply preview (collapsed) */}
          {showThreadPreview && replies.length > 0 && (
            <div className="reply-preview" onClick={() => { closeAllPickers(); setOpenThread({ channelId: activeChannel, msgId: msg.id }); }}
              style={isThreadOpen ? { background: 'var(--primary-light)' } : {}}>
              <div className="reply-avatars">
                {replyUsers.slice(0, 3).map((u, i) => (
                  <div key={i} className="reply-av" style={{ background: u.color }}>{u.avatar}</div>
                ))}
              </div>
              <span className="reply-count">{replies.length} {replies.length === 1 ? 'reply' : 'replies'}</span>
              {lastReply && <span className="reply-last">Last reply {lastReply.time}</span>}
            </div>
          )}
        </div>

      </div>
    );
  };

  const getChannelIcon = (ch) => {
    if (!ch) return { icon: 'fa-hashtag' };
    if (ch.visibility === 'private') return { icon: 'fa-lock' };
    if (ch.visibility === 'dm') return { icon: 'fa-user' };
    return { icon: 'fa-hashtag' };
  };
  const chIcon = getChannelIcon(channel);
  const canSend = channel && isJoined(channel);

  return (
    <div className="chat-layout">
      {/* ── Channel Sidebar ── */}
      <div className={`chat-channels ${mobileShowMessages ? 'hidden-mobile' : ''}`}>
        <div className="chat-channels-header">
          <h3>Messages</h3>
          <div style={{ display: 'flex', gap: 4 }}>
            <button className="chat-icon-btn" title="New direct message" onClick={() => setShowNewDM(true)}><i className="fas fa-edit" /></button>
            <button className="chat-icon-btn" title="Create channel" onClick={() => setShowCreateChannel(true)}><i className="fas fa-plus" /></button>
          </div>
        </div>
        <div style={{ padding: '8px 8px 0' }}>
          <div className="search-bar" style={{ marginBottom: 4 }}>
            <i className="fas fa-search" style={{ fontSize: 12 }} />
            <input placeholder="Search..." value={channelSearch} onChange={e => setChannelSearch(e.target.value)} style={{ fontSize: 13 }} />
          </div>
        </div>
        <div className="channel-list">
          <div className="channel-type" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none' }} onClick={() => toggleSection('public')}>
            <span><i className={`fas fa-chevron-${sidebarCollapsed.public ? 'right' : 'down'}`} style={{ fontSize: 9, marginRight: 4 }} /> Channels</span>
            <span style={{ fontSize: 10, cursor: 'pointer', color: 'var(--primary)' }} onClick={e => { e.stopPropagation(); setShowBrowseChannels(true); }} title="Browse channels"><i className="fas fa-compass" /></span>
          </div>
          {!sidebarCollapsed.public && (() => {
            const filtered = joinedPublic.filter(c => !channelSearch || c.name.toLowerCase().includes(channelSearch.toLowerCase()));
            const unjoinedMatches = channelSearch ? channels.filter(c => c.visibility === 'public' && !isJoined(c) && c.name.toLowerCase().includes(channelSearch.toLowerCase())) : [];
            return (<>
              {filtered.map(c => (
                <div key={c.id} className={`channel-item ${activeChannel === c.id ? 'active' : ''}`} onClick={() => { setActiveChannel(c.id); setOpenThread(null); setMobileShowMessages(true); }}>
                  <i className="fas fa-hashtag" style={{ fontSize: 12, opacity: 0.5 }} />
                  <span style={{ flex: 1 }}>{c.name}</span>
                  {c.muted && <i className="fas fa-bell-slash" style={{ fontSize: 10, opacity: 0.4 }} />}
                  {c.unread > 0 && !c.muted && <span className="nav-badge" style={{ fontSize: 10, padding: '0 5px' }}>{c.unread}</span>}
                </div>
              ))}
              {unjoinedMatches.map(c => (
                <div key={c.id} className={`channel-item ${activeChannel === c.id ? 'active' : ''}`} onClick={() => { setActiveChannel(c.id); setOpenThread(null); setMobileShowMessages(true); }} style={{ opacity: 0.6 }}>
                  <i className="fas fa-hashtag" style={{ fontSize: 12, opacity: 0.5 }} />
                  <span style={{ flex: 1 }}>{c.name}</span>
                  <span style={{ fontSize: 10, color: 'var(--text-light)', fontStyle: 'italic' }}>Join</span>
                </div>
              ))}
            </>);
          })()}
          <div className="channel-type" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none', marginTop: 8 }} onClick={() => toggleSection('private')}>
            <span><i className={`fas fa-chevron-${sidebarCollapsed.private ? 'right' : 'down'}`} style={{ fontSize: 9, marginRight: 4 }} /> Private Channels</span>
          </div>
          {!sidebarCollapsed.private && privateChannels.filter(c => !channelSearch || c.name.includes(channelSearch.toLowerCase())).map(c => (
            <div key={c.id} className={`channel-item ${activeChannel === c.id ? 'active' : ''}`} onClick={() => { setActiveChannel(c.id); setOpenThread(null); setMobileShowMessages(true); }}>
              <i className="fas fa-lock" style={{ fontSize: 11, opacity: 0.5 }} />
              <span style={{ flex: 1 }}>{c.name}</span>
              {c.unread > 0 && <span className="nav-badge" style={{ fontSize: 10, padding: '0 5px' }}>{c.unread}</span>}
            </div>
          ))}
          <div className="channel-type" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', userSelect: 'none', marginTop: 8 }} onClick={() => toggleSection('dm')}>
            <span><i className={`fas fa-chevron-${sidebarCollapsed.dm ? 'right' : 'down'}`} style={{ fontSize: 9, marginRight: 4 }} /> Direct Messages</span>
            <span style={{ fontSize: 10, cursor: 'pointer', color: 'var(--primary)' }} onClick={e => { e.stopPropagation(); setShowNewDM(true); }} title="New DM"><i className="fas fa-plus" /></span>
          </div>
          {!sidebarCollapsed.dm && dmChannels.filter(c => {
            const dmName = getDmName(c);
            return !channelSearch || dmName.toLowerCase().includes(channelSearch.toLowerCase());
          }).map(c => {
            const emp = getDmEmp(c);
            const isOnline = emp?.clockedIn;
            return (
              <div key={c.id} className={`channel-item ${activeChannel === c.id ? 'active' : ''}`} onClick={() => { setActiveChannel(c.id); setOpenThread(null); setMobileShowMessages(true); }}>
                <div style={{ position: 'relative' }}>
                  <div className="avatar sm" style={{ background: emp?.color || '#999' }}>{emp?.avatar || '?'}</div>
                  <div style={{ position: 'absolute', bottom: -1, right: -1, width: 10, height: 10, borderRadius: '50%', background: isOnline ? 'var(--success)' : '#d1d5db', border: '2px solid #f2f0ec' }} />
                </div>
                <span style={{ flex: 1 }}>{getDmName(c)}</span>
                {c.unread > 0 && <span className="nav-badge" style={{ fontSize: 10, padding: '0 5px' }}>{c.unread}</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Main Chat Area (column 2) ── */}
      <div className={`chat-main ${!mobileShowMessages ? 'hidden-mobile' : ''}`}>
        <div className="chat-header">
          <div className="chat-header-left">
            <h3 style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <button className="mobile-chat-back" onClick={() => setMobileShowMessages(false)} style={{ display: 'none' }}>
                <i className="fas fa-arrow-left" />
              </button>
              <i className={`fas ${chIcon.icon}`} style={{ fontSize: 13, opacity: 0.5 }} />
              {channel?.visibility === 'dm' ? getDmName(channel) : channel?.name}
              {channel?.visibility === 'private' && <span className="badge purple" style={{ fontSize: 10, padding: '1px 6px' }}>Private</span>}
            </h3>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {channel?.description || ''}
              {channel?.joinedBy && <span style={{ fontSize: 11, opacity: 0.6 }}> · {channel.joinedBy.length} members</span>}
            </span>
          </div>
          <div className="chat-header-right">
            {channel?.visibility === 'private' && role === 'admin' && (
              <button className="chat-icon-btn" title="Invite people" onClick={() => setShowInviteModal(true)}><i className="fas fa-user-plus" /></button>
            )}
            <button className="chat-icon-btn" title="Search"><i className="fas fa-search" /></button>
            <button className="chat-icon-btn" title="Pin messages"><i className="fas fa-thumbtack" /></button>
            <button className="chat-icon-btn" title={channel?.muted ? 'Unmute' : 'Mute'} onClick={() => {
              setChannels(channels.map(c => c.id === activeChannel ? { ...c, muted: !c.muted } : c));
            }}><i className={`fas ${channel?.muted ? 'fa-bell-slash' : 'fa-bell'}`} /></button>
            <button className="chat-icon-btn" title="Members"><i className="fas fa-user-friends" /></button>
            {channel?.visibility === 'public' && channel && isJoined(channel) && (
              <button className="chat-icon-btn" title="Leave channel" onClick={() => leaveChannel(activeChannel)} style={{ color: 'var(--danger)' }}><i className="fas fa-sign-out-alt" /></button>
            )}
          </div>
        </div>

        <div className="chat-messages">
          {(channelMessages).map(msg => (
            <MessageBubble key={msg.id} msg={msg} compact={false} showThreadPreview={true} chId={activeChannel} />
          ))}
          {(channelMessages).length === 0 && !canSend && (
            <div style={{ textAlign: 'center', padding: 40 }}>
              <i className="fas fa-hashtag" style={{ fontSize: 36, color: 'var(--border)', marginBottom: 12 }} />
              <h3 style={{ marginBottom: 4 }}>#{channel?.name}</h3>
              <p style={{ color: 'var(--text-light)' }}>{channel?.description}</p>
            </div>
          )}
          {canSend && (channelMessages).length === 0 && (
            <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-light)' }}>
              <i className="fas fa-comment-dots" style={{ fontSize: 36, opacity: 0.3, marginBottom: 12, display: 'block' }} />
              <p>No messages yet. Start the conversation!</p>
            </div>
          )}
          <div ref={messagesEndRef} />
        </div>

        {canSend ? (
          <div className="chat-composer" style={{ position: 'relative' }}>
            {/* Picker backdrop for mobile */}
            {(showEmojiPicker || showGifPicker || showMentionPicker) && (
              <div className="picker-backdrop mobile-only" onClick={closeAllPickers} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.3)', zIndex: 340 }} />
            )}
            {/* Emoji picker */}
            {showEmojiPicker && (
              <div className="picker-popup" style={{ width: 380 }}>
                <div className="picker-search" style={{ borderBottom: '1px solid var(--border)' }}>
                  <input placeholder="Search emojis..." value={emojiSearch} onChange={e => setEmojiSearch(e.target.value)} />
                </div>
                <div className="picker-grid">
                  <div className="picker-cat-section">
                    <div className="emoji-cat-label">Favorites</div>
                    <div className="emoji-row">
                      {EMOJI_FAVORITES.filter(e => !emojiSearch || e.includes(emojiSearch)).map((e, i) => (
                        <button key={i} className="emoji-btn" onMouseDown={e2 => e2.preventDefault()} onClick={() => insertEmoji(e)}>{e}</button>
                      ))}
                    </div>
                  </div>
                  {Object.entries(EMOJI_CATEGORIES).map(([cat, emojis]) => {
                    const filtered = emojis.filter(e => !emojiSearch || e.includes(emojiSearch));
                    if (filtered.length === 0) return null;
                    return (
                      <div key={cat} className="picker-cat-section">
                        <div className="emoji-cat-label">{cat}</div>
                        <div className="emoji-row">
                          {filtered.map((e, i) => (
                            <button key={i} className="emoji-btn" onMouseDown={e2 => e2.preventDefault()} onClick={() => insertEmoji(e)}>{e}</button>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
            <input type="file" ref={fileInputRef} style={{ display: 'none' }} onChange={onFileSelected} />
            {showAttachMenu && !showGifPicker && (
              <div className="attach-menu">
                <div className="attach-menu-item" onClick={() => { handleFileAttach(''); setShowAttachMenu(false); }}>
                  <i className="fas fa-file" style={{ color: 'var(--primary)' }} />
                  <span>File</span>
                </div>
                <div className="attach-menu-item" onClick={() => { handleFileAttach('image/*'); setShowAttachMenu(false); }}>
                  <i className="fas fa-camera" style={{ color: 'var(--success)' }} />
                  <span>Photo</span>
                </div>
                <div className="attach-menu-item" onClick={() => { handleFileAttach('video/*'); setShowAttachMenu(false); }}>
                  <i className="fas fa-video" style={{ color: 'var(--purple)' }} />
                  <span>Video</span>
                </div>
                <div className="attach-menu-item" onClick={() => { setShowAttachMenu(false); togglePicker('gif'); }}>
                  <i className="fas fa-images" style={{ color: 'var(--warning)' }} />
                  <span>GIF</span>
                </div>
              </div>
            )}
            {showGifPicker && (
              <div className="picker-popup" style={{ width: 340 }}>
                <div className="picker-search" style={{ borderBottom: '1px solid var(--border)' }}>
                  <input placeholder="Search GIFs..." value={gifSearch} onChange={e => setGifSearch(e.target.value)} autoFocus />
                </div>
                <div className="gif-grid">
                  {giphyLoading && <div style={{ width: '100%', textAlign: 'center', padding: 20, color: 'var(--text-light)' }}><i className="fas fa-spinner fa-spin" /> Loading...</div>}
                  {!giphyLoading && giphyResults.length === 0 && <div style={{ width: '100%', textAlign: 'center', padding: 20, color: 'var(--text-light)' }}>No GIFs found</div>}
                  {giphyResults.map(g => (
                    <div key={g.id} className="gif-item" onClick={() => insertGif(g)} title={g.title}>
                      <img src={g.images?.fixed_width?.url || g.images?.fixed_height_small?.url} alt={g.title} loading="lazy" />
                    </div>
                  ))}
                </div>
                <div style={{ textAlign: 'center', padding: '4px 0', borderTop: '1px solid var(--border)', background: 'var(--bg)' }}>
                  <img src="https://media.giphy.com/attribution/poweredby-dark-horz.png" alt="Powered by GIPHY" style={{ height: 14, opacity: 0.6 }} />
                </div>
              </div>
            )}
            {showMentionPicker && (
              <div className="picker-popup" style={{ width: 260 }}>
                <div className="picker-search" style={{ borderBottom: '1px solid var(--border)' }}>
                  <input placeholder="Search people..." value={mentionSearch} onChange={e => setMentionSearch(e.target.value)} autoFocus />
                </div>
                <div className="mention-list">
                  {EMPLOYEES.filter(e => !mentionSearch || e.name.toLowerCase().includes(mentionSearch.toLowerCase())).map(e => (
                    <div key={e.id} className="mention-item" onClick={() => insertMention(e)}>
                      <div className="avatar sm" style={{ background: e.color, width: 28, height: 28, fontSize: 11 }}>{e.avatar}</div>
                      <div>
                        <div className="mention-name">{e.name}</div>
                        <div className="mention-role">{e.role}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="composer-toolbar">
              <button title="Title" onMouseDown={e => { e.preventDefault(); toggleTitle(); }} style={activeFormats.title ? { color: 'var(--primary)', background: 'var(--primary-light)' } : {}}><i className="fas fa-heading" /></button>
              <button title="Bold" onMouseDown={e => { e.preventDefault(); execFormat('bold'); }} style={activeFormats.bold ? { color: 'var(--primary)', background: 'var(--primary-light)' } : {}}><i className="fas fa-bold" /></button>
              <button title="Italic" onMouseDown={e => { e.preventDefault(); execFormat('italic'); }} style={activeFormats.italic ? { color: 'var(--primary)', background: 'var(--primary-light)' } : {}}><i className="fas fa-italic" /></button>
              <button title="Underline" onMouseDown={e => { e.preventDefault(); execFormat('underline'); }} style={activeFormats.underline ? { color: 'var(--primary)', background: 'var(--primary-light)' } : {}}><i className="fas fa-underline" /></button>
              <button title="Attach" onClick={() => { closeAllPickers(); setShowAttachMenu(!showAttachMenu); }} style={showAttachMenu || showGifPicker || attachedFile ? { color: 'var(--primary)', background: 'var(--primary-light)' } : {}}><i className="fas fa-paperclip" /></button>
              <button title="Emoji" onClick={() => togglePicker('emoji')} style={showEmojiPicker ? { color: 'var(--primary)', background: 'var(--primary-light)' } : {}}><i className="fas fa-smile" /></button>
              <button title="Create poll" onClick={() => { closeAllPickers(); setShowPollModal(true); }}><i className="fas fa-poll" /></button>
              <button title="Mention" onClick={() => togglePicker('mention')} style={showMentionPicker ? { color: 'var(--primary)', background: 'var(--primary-light)' } : {}}><i className="fas fa-at" /></button>
            </div>
            {attachedFile && (
              <div className="file-attachment-preview">
                {attachedFile.preview ? (
                  <img src={attachedFile.preview} alt="" style={{ width: 40, height: 40, objectFit: 'cover', borderRadius: 6 }} />
                ) : (
                  <i className={`fas ${attachedFile.icon}`} style={{ fontSize: 20, color: attachedFile.color }} />
                )}
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{attachedFile.name}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-light)' }}>{attachedFile.size}{uploadingFile ? ' — Uploading...' : ''}</div>
                </div>
                {!uploadingFile && <button className="file-remove" onClick={() => { if (attachedFile.preview) URL.revokeObjectURL(attachedFile.preview); setAttachedFile(null); }} title="Remove"><i className="fas fa-times" /></button>}
                {uploadingFile && <i className="fas fa-spinner fa-spin" style={{ color: 'var(--primary)' }} />}
              </div>
            )}
            <div className="composer-input-wrap">
              <div ref={composerRef} className="composer-input" contentEditable={true}
                data-placeholder={`Message ${channel?.visibility === 'dm' ? getDmName(channel) : (channel?.visibility === 'private' ? '🔒 ' : '#') + (channel?.name || '')}...`}
                onMouseUp={saveSelection} onKeyUp={saveSelection} onFocus={saveSelection}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
                onKeyUp={updateActiveFormats}
                onMouseUp={updateActiveFormats}
              />
              <div className="send-later-dropdown">
                <button className="composer-send" onClick={sendMessage}
                  onContextMenu={e => { e.preventDefault(); setShowSendLater(!showSendLater); }} title="Send (right-click for schedule)">
                  <i className="fas fa-paper-plane" />
                </button>
                {showSendLater && (
                  <div className="send-later-menu">
                    <div style={{ padding: '8px 12px', fontSize: 12, fontWeight: 600, color: 'var(--text-light)', borderBottom: '1px solid var(--border)' }}>
                      <i className="fas fa-clock" style={{ marginRight: 6 }} />Schedule Message
                    </div>
                    <div className="send-later-option" onClick={() => setShowSendLater(false)}><i className="fas fa-sun" /> Tomorrow at 8:00 AM</div>
                    <div className="send-later-option" onClick={() => setShowSendLater(false)}><i className="fas fa-calendar" /> Monday at 9:00 AM</div>
                    <div className="send-later-option" onClick={() => setShowSendLater(false)}><i className="fas fa-clock" /> Custom date & time...</div>
                  </div>
                )}
              </div>
            </div>
          </div>
        ) : (
          <div style={{ padding: '12px 20px', borderTop: '1px solid var(--border)', background: '#f7f6f3', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12 }}>
            <span style={{ fontSize: 13, color: 'var(--text-light)' }}>You're viewing <b>#{channel?.name}</b></span>
            <button className="topbar-btn primary" onClick={() => joinChannel(channel.id)} style={{ padding: '6px 16px' }}><i className="fas fa-plus-circle" style={{ marginRight: 6 }} />Join Channel</button>
          </div>
        )}
      </div>

      {/* ── Thread Panel (column 3) ── */}
      {openThread && threadParent && (
        <div className="thread-panel">
          <div className="thread-header">
            <h4>Thread</h4>
            <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
              <span style={{ fontSize: 12, color: 'var(--text-light)', marginRight: 4 }}>
                {(threadParent.replies || []).length} {(threadParent.replies || []).length === 1 ? 'reply' : 'replies'}
              </span>
              <button className="chat-icon-btn" style={{ width: 28, height: 28, fontSize: 13 }} onClick={() => setOpenThread(null)} title="Close thread">
                <i className="fas fa-times" />
              </button>
            </div>
          </div>
          <div className="thread-messages">
            {/* Original parent message */}
            <MessageBubble msg={threadParent} compact={false} showThreadPreview={false} chId={openThread.channelId} />
            {/* Divider */}
            {(threadParent.replies || []).length > 0 && (
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, margin: '12px 0', fontSize: 11, color: 'var(--text-light)' }}>
                <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
                <span>{(threadParent.replies || []).length} {(threadParent.replies || []).length === 1 ? 'reply' : 'replies'}</span>
                <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
              </div>
            )}
            {/* Reply messages */}
            {(threadParent.replies || []).map(reply => (
              <MessageBubble key={reply.id} msg={reply} compact={true} showThreadPreview={false} chId={openThread.channelId} parentMsgId={threadParent.id} />
            ))}
            <div ref={threadEndRef} />
          </div>
          <div className="thread-composer">
            <textarea
              placeholder="Reply..."
              value={threadReply}
              onChange={e => setThreadReply(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendThreadReply(); } }}
              rows={1}
            />
            <button onClick={sendThreadReply} title="Send reply"><i className="fas fa-paper-plane" /></button>
          </div>
        </div>
      )}

              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 2 }}><i className="fas fa-lock" style={{ marginRight: 6 }} />Private</div>

        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>

      <Modal show={showNewDM} onClose={() => setShowNewDM(false)} title="New Direct Message">

        <div style={{ maxHeight: 300, overflow: 'auto' }}>
          {EMPLOYEES.filter(e => e.status === 'active' && e.id !== uid).map(emp => {
            const existingDM = dmChannels.find(c => c.members && c.members.includes(emp.id) && c.members.includes(uid));
            return (
              <div key={emp.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 0', borderBottom: '1px solid var(--border)', cursor: 'pointer' }}
                onClick={async () => { if (existingDM) { setActiveChannel(existingDM.id); } else { const docRef = await db.collection('channels').add({ name: emp.name, visibility: 'dm', empId: emp.id, joinedBy: [uid, emp.id], members: [uid, emp.id], createdBy: uid, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); setActiveChannel(docRef.id); } setShowNewDM(false); setMobileShowMessages(true); }}>
                <div style={{ position: 'relative' }}>
                  <div className="avatar" style={{ background: emp.color }}>{emp.avatar}</div>
                  <div style={{ position: 'absolute', bottom: 0, right: 0, width: 12, height: 12, borderRadius: '50%', background: emp.clockedIn ? 'var(--success)' : '#d1d5db', border: '2px solid white' }} />
                </div>
                <div style={{ flex: 1 }}><div style={{ fontWeight: 600, fontSize: 14 }}>{emp.name}</div><div style={{ fontSize: 12, color: 'var(--text-light)' }}>{emp.role} · {emp.clockedIn ? 'Online' : 'Offline'}</div></div>

        <div className="form-group"><div className="search-bar"><i className="fas fa-search" /><input placeholder="Search people to invite..." /></div></div>
        {EMPLOYEES.filter(e => e.status === 'active').slice(0, 5).map(emp => (
          <div key={emp.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderBottom: '1px solid var(--border)' }}>
            <div className="avatar sm" style={{ background: emp.color }}>{emp.avatar}</div>
            <div style={{ flex: 1 }}><div style={{ fontWeight: 600, fontSize: 13 }}>{emp.name}</div><div style={{ fontSize: 11, color: 'var(--text-light)' }}>{emp.role}</div></div>
            <button className="topbar-btn" style={{ padding: '3px 10px', fontSize: 12 }}>Invite</button>

      <Modal show={showPollModal} onClose={() => setShowPollModal(false)} title="Create a Poll">
        <div className="form-group"><label className="form-label">Question</label><input className="form-input" placeholder="Ask a question..." value={pollQuestion} onChange={e => setPollQuestion(e.target.value)} /></div>
        {pollOptions.map((opt, i) => (
          <div className="form-group" key={i}><label className="form-label">Option {i + 1}</label><input className="form-input" placeholder={`Option ${i + 1}`} value={opt} onChange={e => { const n = [...pollOptions]; n[i] = e.target.value; setPollOptions(n); }} /></div>
        ))}
        <button className="topbar-btn" style={{ marginBottom: 16 }} onClick={() => setPollOptions([...pollOptions, ''])}><i className="fas fa-plus" /> Add Option</button>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="topbar-btn" onClick={() => setShowPollModal(false)}>Cancel</button>
