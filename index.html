    } catch (err) {
      setIsLoading(false);
      if (err.code === 'auth/popup-closed-by-user') {
        // User closed the popup, no error needed
        return;
      }
      setError(err.message || 'Google sign-in failed. Please try again.');
    }
  };

  const handleSendCode = async () => {
    setError('');
    setIsLoading(true);
    try {
      const fullNumber = '+1' + rawDigits;
      const result = await firebaseAuth.signInWithPhoneNumber(fullNumber, recaptchaRef.current);
      setConfirmationResult(result);
      setIsLoading(false);
      setStep('code');
    } catch (err) {
      setIsLoading(false);
      if (err.code === 'auth/invalid-phone-number') {
        setError('Please enter a valid phone number.');
      } else if (err.code === 'auth/too-many-requests') {
        setError('Too many attempts. Please try again later.');
      } else {
        setError(err.message || 'Failed to send verification code.');
      }
    }
  };

  const handleCodeInput = async (index, value) => {
    if (!/^\d*$/.test(value)) return;
    const newCode = [...code];
    newCode[index] = value.slice(-1);
    setCode(newCode);
    if (value && index < 5) {
      codeRefs[index + 1].current?.focus();
    }
    // Auto-submit when all 6 filled
    if (newCode.every(d => d !== '') && newCode.join('').length === 6) {
      setIsLoading(true);
      try {
        await confirmationResult.confirm(newCode.join(''));
        // Firebase auth succeeded — now check if phone is in allowlist
        const digits = rawDigits.slice(-10);
        const empSnap = await db.collection('employees')
          .where('phoneNormalized', '==', digits)
          .limit(1).get();
        if (empSnap.empty) {
          // Check if this is the very first user (empty employees = seed admin)
          const allEmps = await db.collection('employees').limit(1).get();
          if (allEmps.empty) {
            // First ever login — create admin account automatically
            const initials = 'A1';
            const docRef = await db.collection('employees').add({
              name: 'Admin',
              phone: rawDigits,
              phoneNormalized: digits,
              email: '',
              role: 'Admin',
              type: 'employee',
              status: 'active',
              payRate: 0,
              address: '',
              emergencyContact: '',
              avatar: initials,
              color: '#4a6741',
              startDate: new Date().toISOString().slice(0, 10),
              clockedIn: false,
              firstLogin: true,
              createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            });
            const newEmp = { id: docRef.id, name: 'Admin', role: 'Admin', avatar: 'A1', color: '#4a6741', firstLogin: true };
            setMatchedEmployee(newEmp);
            setIsLoading(false);
            setSetupName('');
            setStep('setup');
            return;
          }
          // Not in allowlist — sign out and show error
          await firebaseAuth.signOut();
          setIsLoading(false);
          setStep('error');
          return;
        }
        const empDoc = empSnap.docs[0];
        const emp = { id: empDoc.id, ...empDoc.data() };
        setMatchedEmployee(emp);
        setIsLoading(false);
        if (emp.firstLogin && !emp.name) {
          setSetupName('');
          setStep('setup');
        } else {
          onLogin(emp);
        }
      } catch (err) {
        setIsLoading(false);
        setError('Invalid verification code. Please try again.');
        setCode(['', '', '', '', '', '']);
        codeRefs[0].current?.focus();
      }
    }
  };

  const handleCodeKeyDown = (index, e) => {
    if (e.key === 'Backspace' && !code[index] && index > 0) {
      codeRefs[index - 1].current?.focus();
    }
  };

  const handleResend = async () => {
    try {
      const fullNumber = '+1' + rawDigits;
      const result = await firebaseAuth.signInWithPhoneNumber(fullNumber, recaptchaRef.current);
      setConfirmationResult(result);
      setResent(true);
      setTimeout(() => setResent(false), 3000);
    } catch (err) {
      setError('Failed to resend code. Please try again.');
    }
  };

  const handleSetupComplete = async () => {
    if (!setupName.trim()) return;
    // Update the employee doc in Firestore with their real name
    if (matchedEmployee?.id) {
      const initials = setupName.trim().split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
      try {
        await db.collection('employees').doc(matchedEmployee.id).update({
          name: setupName.trim(),
          avatar: initials,
          firstLogin: false,
        });
      } catch (err) {
        console.error('Failed to update profile:', err);
      }
    }
    onLogin({ ...matchedEmployee, name: setupName.trim() });
  };

  return (
    <div className="auth-screen">
      <div id="recaptcha-container" />
      <div className="auth-left">
        <div className="auth-brand">
          <img src={ESSENCE_LOGO} alt="Essence Cleaning Services" style={{ height: 100, objectFit: 'contain', display: 'block' }} />
          <p>Team Management Portal</p>
        </div>

        {step === 'phone' && (
          <div className="auth-card" style={{ textAlign: 'center' }}>
            <h2>Welcome back</h2>
            <div className="auth-subtitle">Sign in to continue to the team portal</div>
            {error && <div className="auth-error" style={{ textAlign: 'left' }}><i className="fas fa-exclamation-circle" />{error}</div>}
            <button className="auth-btn google-btn" onClick={handleGoogleSignIn} disabled={isLoading}
              style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, background: '#fff', color: '#333', border: '1.5px solid var(--border)', fontWeight: 600, fontSize: 15, marginTop: 8 }}>
              <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
              {isLoading ? 'Signing in...' : 'Sign in with Google'}
            </button>
            <div style={{ marginTop: 24 }}>
              <span className="auth-link" onClick={() => setStep('phone-entry')} style={{ fontSize: 13, color: 'var(--text-light)' }}>
                <i className="fas fa-mobile-alt" style={{ marginRight: 6 }} />Sign in with phone number instead
              </span>
            </div>
            <div style={{ marginTop: 20 }}>
              <span style={{ fontSize: 12, color: 'var(--text-light)' }}>Don't have access? Contact your administrator.</span>
            </div>
          </div>
        )}

        {step === 'phone-entry' && (
          <div className="auth-card">
            <h2>Phone sign in</h2>
            <div className="auth-subtitle">We'll text you a verification code</div>
            {error && <div className="auth-error"><i className="fas fa-exclamation-circle" />{error}</div>}
            <div className="auth-input-group">
              <label>Phone number</label>
              <div style={{ position: 'relative' }}>
                <span className="phone-prefix">+1</span>
                <input className="auth-input phone" type="tel"
                  placeholder="(555) 012-3456"
                  value={phone}
                  onChange={e => setPhone(formatPhone(e.target.value))}
                  onKeyDown={e => { if (e.key === 'Enter' && rawDigits.length >= 7) handleSendCode(); }}
                />
              </div>
            </div>
            <button className="auth-btn primary" disabled={rawDigits.length < 10 || isLoading} onClick={handleSendCode}>
              {isLoading ? <><i className="fas fa-spinner fa-spin" style={{ marginRight: 8 }} />Sending code...</> : 'Send verification code'}
            </button>
            <div style={{ textAlign: 'center', marginTop: 16 }}>
              <span className="auth-link" onClick={() => { setStep('phone'); setError(''); }} style={{ fontSize: 13 }}>
                <i className="fas fa-arrow-left" style={{ marginRight: 6 }} />Back to Google sign in
              </span>
            </div>
          </div>
        )}

        {step === 'code' && (
          <div className="auth-card" style={{ textAlign: 'center' }}>
            <h2>Enter verification code</h2>
            <div className="auth-subtitle">We sent a 6-digit code to +1 {phone}</div>
            {resent && <div className="auth-success"><i className="fas fa-check-circle" />Code resent successfully</div>}
            <div className="auth-code-inputs">
              {code.map((digit, i) => (
                <input key={i} ref={codeRefs[i]} type="text" inputMode="numeric" maxLength={1}
                  value={digit} onChange={e => handleCodeInput(i, e.target.value)}
                  onKeyDown={e => handleCodeKeyDown(i, e)}
                  autoFocus={i === 0} />
              ))}
            </div>
            {isLoading && <div style={{ marginBottom: 16 }}><i className="fas fa-spinner fa-spin" style={{ color: 'var(--primary)', fontSize: 20 }} /></div>}
            <div style={{ display: 'flex', justifyContent: 'center', gap: 16, fontSize: 13 }}>
              <span className="auth-link" onClick={handleResend}>Resend code</span>
              <span className="auth-link" onClick={() => { setStep('phone-entry'); setCode(['','','','','','']); }}>Change number</span>
            </div>
            <div style={{ marginTop: 16, fontSize: 12, color: 'var(--text-light)' }}>
              Didn't receive the code? Check your SMS messages
            </div>
          </div>
        )}

        {step === 'setup' && (
          <div className="auth-card" style={{ textAlign: 'center' }}>
            <h2>Welcome to ECS!</h2>
            <div className="auth-subtitle">Let's set up your profile to get started</div>
            <div className="setup-avatar-pick">
              <i className="fas fa-camera" />
            </div>
            <div style={{ fontSize: 12, color: 'var(--text-light)', marginBottom: 20 }}>Tap to upload a photo</div>
            <div className="auth-input-group" style={{ textAlign: 'left' }}>
              <label>Your name</label>
              <input className="auth-input" value={setupName} onChange={e => setSetupName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') handleSetupComplete(); }} />
            </div>
            <div className="auth-input-group" style={{ textAlign: 'left' }}>
              <label>Job title</label>
              <input className="auth-input" value={matchedEmployee?.role || ''} readOnly style={{ background: 'var(--bg)', color: 'var(--text-light)' }} />
              <div style={{ fontSize: 11, color: 'var(--text-light)', marginTop: 4 }}>Set by your administrator</div>
            </div>
            <button className="auth-btn primary" onClick={handleSetupComplete} disabled={!setupName.trim()}>
              Get started
            </button>
          </div>
        )}

        {step === 'error' && (
          <div className="auth-card" style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>🔒</div>
            <h2>Phone number not found</h2>
            <div className="auth-subtitle" style={{ marginBottom: 20 }}>
              The number +1 {phone} isn't registered with any ECS organization. Your administrator needs to create your profile before you can sign in.
            </div>
            <div className="auth-error" style={{ textAlign: 'left' }}>
              <i className="fas fa-info-circle" />
              Ask your admin to add your phone number to the system, then try again.
            </div>
            <button className="auth-btn primary" style={{ marginTop: 8 }} onClick={() => { setStep('phone-entry'); setPhone(''); setError(''); }}>
              Try a different number
            </button>
          </div>
        )}

        {step === 'google-error' && (
          <div className="auth-card" style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>🔒</div>
            <h2>Email not found</h2>
            <div className="auth-subtitle" style={{ marginBottom: 20 }}>
              Your Google account isn't registered with any ECS organization. Your administrator needs to add your email to the system before you can sign in.
            </div>
            <div className="auth-error" style={{ textAlign: 'left' }}>
              <i className="fas fa-info-circle" />
              Ask your admin to add your email address to your employee profile, then try again.
            </div>
            <button className="auth-btn primary" style={{ marginTop: 8 }} onClick={() => { setStep('phone'); setError(''); }}>
              Back to sign in
            </button>
          </div>
        )}

        <div style={{ display: 'flex', gap: 16, marginTop: 28, color: 'var(--text-light)', fontSize: 12, flexWrap: 'wrap', justifyContent: 'center' }}>
          <span><i className="fas fa-shield-alt" style={{ color: '#4a6741', marginRight: 5 }} />Secure by design</span>
          <span><i className="fas fa-mobile-alt" style={{ color: '#7cb342', marginRight: 5 }} />No passwords</span>
          <span><i className="fas fa-users-cog" style={{ color: '#c8a84e', marginRight: 5 }} />Admin-managed</span>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [authedUser, setAuthedUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [employees, setEmployees] = useState([]);
  const [clients, setClients] = useState([]);
  const [role, setRole] = useState('admin');
  const [page, setPage] = useState('dashboard');
  const [showUserMenu, setShowUserMenu] = useState(false);
  const [showMobileMore, setShowMobileMore] = useState(false);
  const [toast, setToast] = useState(null);
  const [notifPermission, setNotifPermission] = useState(
    typeof Notification !== 'undefined' ? Notification.permission : 'default'
  );
  const userMenuRef = useRef(null);
  const [chatUnread, setChatUnread] = useState(0);

  // Sync active page to global for notification suppression
  useEffect(() => {
    window.__ecsActivePage = page;
    // Clear chat unread when entering chat
    if (page === 'chat') {
      setChatUnread(0);
      window.__ecsChatUnread = 0;
      _badgeCount = 0;
      if ('clearAppBadge' in navigator) navigator.clearAppBadge().catch(() => {});
    }
  }, [page]);

  // Listen for unread count updates from foreground notification handler
  useEffect(() => {
    const handler = () => setChatUnread(window.__ecsChatUnread || 0);
    window.addEventListener('ecs-unread-update', handler);
    return () => window.removeEventListener('ecs-unread-update', handler);
  }, []);

  // Request push notification permission after successful login
  useEffect(() => {
    if (authedUser?.id && notifPermission === 'default') {
      // Delay prompt slightly so it doesn't appear immediately on login
      const timer = setTimeout(() => {
        requestNotificationPermission(authedUser.id).then((token) => {
          if (token) setNotifPermission('granted');
        });
      }, 3000);
      return () => clearTimeout(timer);
    }
  }, [authedUser?.id]);

  // Listen for foreground notifications and show in-app toast
  useEffect(() => {
    const handler = (e) => {
      const { title, body, type } = e.detail;
      setToast({ title, body, type });
      // Auto-dismiss after 5 seconds
      setTimeout(() => setToast(null), 5000);
    };
    window.addEventListener('essence-notification', handler);
    return () => window.removeEventListener('essence-notification', handler);
  }, []);

  // Clear app badge when user is actively using the app
  useEffect(() => {
    if (authedUser && 'clearAppBadge' in navigator) {
      navigator.clearAppBadge().catch(() => {});
    }
  }, [page, authedUser]);

  // Load employees from Firestore (realtime) — updates global + state
  useEffect(() => {
    const unsub = db.collection('employees').onSnapshot((snap) => {
      const emps = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      EMPLOYEES = emps; // update global for child components
      setEmployees(emps);
    });
    return () => unsub();
  }, []);

  // Load clients from Firestore (realtime) — updates global + state
  useEffect(() => {
    const unsub = db.collection('clients').onSnapshot((snap) => {
      const cls = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      CLIENTS = cls;
      setClients(cls);
    });
    return () => unsub();
  }, []);

  // Listen for Firebase auth state — check phone against Firestore employees
  useEffect(() => {
    // Try to restore cached employee data immediately (avoids flash of login screen)
    try {
      const cached = sessionStorage.getItem('ecs_employee');
      if (cached) {
        const emp = JSON.parse(cached);
        setAuthedUser(emp);
      }
    } catch (e) {}

    const unsubscribe = firebaseAuth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          let snap;
          // Try matching by phone first (phone auth), then by email (Google auth)
          const phoneDigits = (user.phoneNumber || '').replace(/\D/g, '');
          const last10 = phoneDigits.slice(-10);
          if (last10) {
            snap = await db.collection('employees')
              .where('phoneNormalized', '==', last10)
              .limit(1).get();
          }
          // If no phone match, try email match
          if ((!snap || snap.empty) && user.email) {
            snap = await db.collection('employees')
              .where('email', '==', user.email.toLowerCase().trim())
              .limit(1).get();
          }
          if (snap && !snap.empty) {
            const empDoc = snap.docs[0];
            const empData = { id: empDoc.id, ...empDoc.data() };
            setAuthedUser(empData);
            // Cache for instant restore on next page load
            try { sessionStorage.setItem('ecs_employee', JSON.stringify(empData)); } catch (e) {}
          } else {
            // Not in allowlist — sign them out
            await firebaseAuth.signOut();
            setAuthedUser(null);
            try { sessionStorage.removeItem('ecs_employee'); } catch (e) {}
            setAuthLoading(false);
            return;
          }
        } catch (err) {
          console.error('Error checking employee allowlist:', err);
          // Don't sign out — use cached data if available
          const cached = sessionStorage.getItem('ecs_employee');
          if (cached) {
            try { setAuthedUser(JSON.parse(cached)); } catch (e) {}
          }
          setAuthLoading(false);
          return;
        }
      } else {
        setAuthedUser(null);
        try { sessionStorage.removeItem('ecs_employee'); } catch (e) {}
      }
      setAuthLoading(false);
    });
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    const handleClick = (e) => {
      if (userMenuRef.current && !userMenuRef.current.contains(e.target)) setShowUserMenu(false);
    };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  const handleLogout = () => { firebaseAuth.signOut(); setAuthedUser(null); setShowUserMenu(false); try { sessionStorage.removeItem('ecs_employee'); } catch(e){} };

  // Navigation structure — top-level items with dropdown children
  const navItems = role === 'admin' ? [
    { id: 'dashboard', label: 'Home', icon: 'fa-th-large', desc: 'Overview & stats', color: '#4a6741', singlePage: true },
    { id: 'chat', label: 'Chat', icon: 'fa-comments', desc: 'Team messaging', color: '#7c6f64', badge: chatUnread || 0, singlePage: true },
    { id: 'operations', label: 'Operations', icon: 'fa-briefcase', children: [
      { id: 'schedule', icon: 'fa-calendar-alt', label: 'Schedule', desc: 'Assign shifts & manage the calendar', color: '#4a6741' },
      { id: 'timesheets', icon: 'fa-clock', label: 'Timesheets', desc: 'Clock in/out records & payroll hours', color: '#5a8a4a' },
      { id: 'shifts', icon: 'fa-exchange-alt', label: 'Shift Swaps', desc: 'Swap requests & open shift pickups', color: '#c8a84e', badge: 2 },
      { id: 'checklists', icon: 'fa-clipboard-check', label: 'Checklists', desc: 'Onsite task lists for each location', color: '#b85c4a' },
    ]},
    { id: 'people', label: 'People', icon: 'fa-users', children: [
      { id: 'employees', icon: 'fa-id-badge', label: 'Employees', desc: 'Profiles, pay rates & tax info', color: '#7c6f64' },
      { id: 'availability', icon: 'fa-calendar-check', label: 'Availability', desc: 'Weekly availability for each team member', color: '#5e8a7a' },
      { id: 'clients', icon: 'fa-building', label: 'Clients', desc: 'Client locations, contacts & rates', color: '#c8a84e' },
    ]},
    { id: 'notifications', label: 'Settings', icon: 'fa-cog', desc: 'Notification preferences', color: '#6b7568', singlePage: true },
  ] : [
    { id: 'dashboard', label: 'Home', icon: 'fa-th-large', desc: 'Overview & stats', color: '#4a6741', singlePage: true },
    { id: 'chat', label: 'Chat', icon: 'fa-comments', desc: 'Team messaging', color: '#7c6f64', badge: chatUnread || 0, singlePage: true },
    { id: 'mywork', label: 'My Work', icon: 'fa-briefcase', children: [
      { id: 'schedule', icon: 'fa-calendar-alt', label: 'My Schedule', desc: 'View your upcoming shifts', color: '#4a6741' },
      { id: 'timesheets', icon: 'fa-clock', label: 'Clock In/Out', desc: 'Track your hours', color: '#5a8a4a' },
      { id: 'shifts', icon: 'fa-exchange-alt', label: 'Shift Swaps', desc: 'Request swaps or pick up shifts', color: '#c8a84e' },
      { id: 'checklists', icon: 'fa-clipboard-check', label: 'Checklists', desc: 'Onsite task lists', color: '#b85c4a' },
      { id: 'availability', icon: 'fa-calendar-check', label: 'My Availability', desc: 'Set when you can work', color: '#5e8a7a' },
    ]},
    { id: 'notifications', label: 'Settings', icon: 'fa-cog', desc: 'Notification preferences', color: '#6b7568', singlePage: true },
  ];

  const adminNav = [
    { section: "Main", items: [
      { id: 'dashboard', icon: 'fa-th-large', label: 'Dashboard' },
      { id: 'chat', icon: 'fa-comments', label: 'Chat', badge: 8 },
    ]},
    { section: "Operations", items: [
      { id: 'schedule', icon: 'fa-calendar-alt', label: 'Schedule' },
      { id: 'timesheets', icon: 'fa-clock', label: 'Timesheets' },
      { id: 'shifts', icon: 'fa-exchange-alt', label: 'Shift Swaps', badge: 2 },
      { id: 'checklists', icon: 'fa-clipboard-check', label: 'Checklists' },
    ]},
    { section: "People", items: [
      { id: 'employees', icon: 'fa-users', label: 'Employees' },
      { id: 'availability', icon: 'fa-calendar-check', label: 'Availability' },
      { id: 'clients', icon: 'fa-building', label: 'Clients' },
    ]},
    { section: "Settings", items: [
      { id: 'notifications', icon: 'fa-bell', label: 'Notifications' },
    ]},
  ];

  const employeeNav = [
    { section: "Main", items: [
      { id: 'dashboard', icon: 'fa-th-large', label: 'Dashboard' },
      { id: 'chat', icon: 'fa-comments', label: 'Chat', badge: 4 },
    ]},
    { section: "My Work", items: [
      { id: 'schedule', icon: 'fa-calendar-alt', label: 'My Schedule' },
      { id: 'timesheets', icon: 'fa-clock', label: 'Clock In/Out' },
      { id: 'shifts', icon: 'fa-exchange-alt', label: 'Shift Swaps' },
      { id: 'checklists', icon: 'fa-clipboard-check', label: 'Checklists' },
      { id: 'availability', icon: 'fa-calendar-check', label: 'My Availability' },
    ]},
    { section: "Settings", items: [
      { id: 'notifications', icon: 'fa-bell', label: 'Notifications' },
    ]},
  ];

  const nav = role === 'admin' ? adminNav : employeeNav;

  const pageTitles = {
    dashboard: 'Dashboard',
    chat: 'Chat',
    schedule: 'Schedule',
    timesheets: 'Timesheets',
    shifts: 'Shift Swaps',
    checklists: 'Checklists',
    employees: 'Employees',
    availability: 'Availability',
    clients: 'Clients',
    notifications: 'Notification Settings',
  };

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return <Dashboard role={role} />;
      case 'chat': return <Chat role={role} authedUser={authedUser} />;
      case 'schedule': return <Schedule role={role} />;
      case 'timesheets': return <Timesheets role={role} />;
      case 'shifts': return <ShiftSwaps role={role} />;
      case 'checklists': return <Checklists role={role} />;
      case 'employees': return <EmployeeProfiles role={role} />;
      case 'availability': return <AvailabilityView role={role} />;
      case 'clients': return <ClientList role={role} />;
      case 'notifications': return <NotificationSettings userId={authedUser?.id} />;
      default: return <Dashboard role={role} />;
    }
  };

  if (authLoading) {
    return <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#fff' }}>
      <i className="fas fa-spinner fa-spin" style={{ fontSize: 28, color: 'var(--primary)' }} />
    </div>;
  }

  if (!authedUser) {
    return <LoginScreen onLogin={setAuthedUser} />;
  }

  const initials = authedUser.name ? authedUser.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2) : 'U';

  return (
    <div className="app">
      {/* ── In-App Toast Notification ── */}
      {toast && (
        <div style={{
          position: 'fixed', top: 16, left: '50%', transform: 'translateX(-50%)',
          background: 'white', borderRadius: 12, padding: '12px 20px', minWidth: 280, maxWidth: 'calc(100vw - 32px)',
          boxShadow: '0 8px 30px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.05)',
          zIndex: 10000, display: 'flex', alignItems: 'center', gap: 12,
          animation: 'slideDownToast 0.3s ease-out',
          cursor: 'pointer',
        }} onClick={() => {
          // Navigate to relevant page based on notification type
          if (toast.type === 'chat') setPage('chat');
          else if (toast.type === 'shift_swap') setPage('shifts');
          else if (toast.type === 'schedule') setPage('schedule');
          else if (toast.type === 'timesheet') setPage('timesheets');
          setToast(null);
        }}>
          <div style={{ width: 36, height: 36, borderRadius: 8, background: 'var(--primary-light)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <i className={`fas ${toast.type === 'chat' ? 'fa-comment' : toast.type === 'shift_swap' ? 'fa-exchange-alt' : toast.type === 'schedule' ? 'fa-calendar' : 'fa-bell'}`} style={{ color: 'var(--primary)', fontSize: 14 }} />
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontWeight: 600, fontSize: 13, color: 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{toast.title}</div>
            {toast.body && <div style={{ fontSize: 12, color: 'var(--text-light)', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{toast.body}</div>}
          </div>
          <button onClick={(e) => { e.stopPropagation(); setToast(null); }} style={{ border: 'none', background: 'none', color: 'var(--text-light)', cursor: 'pointer', padding: 4, fontSize: 14 }}>
            <i className="fas fa-times" />
          </button>
        </div>
      )}

      {/* ── Horizontal Top Nav ── */}
      <nav className="topnav">
        <div className="topnav-logo" onClick={() => setPage('dashboard')} style={{ cursor: 'pointer' }}>
          <div style={{ background: 'rgba(255,255,255,0.92)', borderRadius: 8, padding: '4px 12px 2px', display: 'flex', alignItems: 'center' }}>
            <img src={ESSENCE_LOGO} alt="Essence Cleaning" style={{ height: 32, objectFit: 'contain' }} />
          </div>
        </div>

        <div className="topnav-links">
          {navItems.map(item => {
            const isActive = item.singlePage
              ? page === item.id
              : item.children?.some(c => c.id === page);

            if (item.singlePage) {
              return (
                <div className="topnav-item" key={item.id}>
                  <div className={`topnav-link ${isActive ? 'active' : ''}`} onClick={() => setPage(item.id)}>
                    <i className={`fas ${item.icon}`} />
                    {item.label}
                    {item.badge && <span className="link-badge">{item.badge}</span>}
                  </div>
                </div>
              );
            }

            return (
              <div className="topnav-item" key={item.id}>
                <div className={`topnav-link ${isActive ? 'active' : ''}`}>
                  <i className={`fas ${item.icon}`} />
                  {item.label}
                  <i className="fas fa-chevron-down" style={{ fontSize: 9, marginLeft: 2, opacity: 0.5 }} />
                </div>
                <div className="topnav-dropdown">
                  {item.children.map(child => (
                    <div key={child.id} className={`dd-item ${page === child.id ? 'active' : ''}`} onClick={() => setPage(child.id)}>
                      <div className="dd-icon" style={{ background: child.color + '18', color: child.color }}>
                        <i className={`fas ${child.icon}`} />
                      </div>
                      <div className="dd-text">
                        <div className="dd-label">
                          {child.label}
                          {child.badge && <span className="dd-badge">{child.badge}</span>}
                        </div>
                        <div className="dd-desc">{child.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>

        <div className="topnav-right">
          <div className="role-toggle">
            <div className={`role-btn ${role === 'admin' ? 'active' : ''}`} onClick={() => setRole('admin')}>Admin</div>
            <div className={`role-btn ${role === 'employee' ? 'active' : ''}`} onClick={() => setRole('employee')}>Employee</div>
          </div>
          <div className="search-bar" style={{ width: 180, background: 'rgba(255,255,255,0.08)', borderColor: 'transparent' }}>
            <i className="fas fa-search" style={{ fontSize: 12, color: '#9ea2a6' }} />
            <input placeholder="Search..." style={{ fontSize: 13, color: 'white' }} />
          </div>
          <button className="topnav-icon-btn">
            <i className="fas fa-bell" />
            <span style={{ position: 'absolute', top: 4, right: 4, width: 8, height: 8, background: 'var(--danger)', borderRadius: '50%', border: '2px solid var(--sidebar-bg)' }} />
          </button>
          <div ref={userMenuRef} style={{ position: 'relative' }}>
            <div className="avatar sm" style={{ background: 'var(--primary)', cursor: 'pointer', fontSize: 12 }} onClick={() => setShowUserMenu(!showUserMenu)}>
              {initials}
            </div>
            {showUserMenu && (
              <div style={{ position: 'absolute', top: '100%', right: 0, marginTop: 6, background: 'white', borderRadius: 12, boxShadow: '0 8px 30px rgba(0,0,0,0.15)', padding: 6, minWidth: 220, zIndex: 999 }}>
                <div style={{ padding: '12px 14px', borderBottom: '1px solid var(--border)', marginBottom: 4 }}>
                  <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--text)' }}>{authedUser.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-light)', marginTop: 2 }}>{authedUser.role || 'Employee'}</div>
                </div>
                <div className="dd-item" onClick={() => setShowUserMenu(false)}>
                  <i className="fas fa-user" style={{ width: 20, textAlign: 'center', color: 'var(--text-light)' }} />
                  <span style={{ fontSize: 14 }}>My Profile</span>
                </div>
                <div className="dd-item" onClick={() => { setShowUserMenu(false); setPage('notifications'); }}>
                  <i className="fas fa-cog" style={{ width: 20, textAlign: 'center', color: 'var(--text-light)' }} />
                  <span style={{ fontSize: 14 }}>Settings</span>
                </div>
                <div style={{ height: 1, background: 'var(--border)', margin: '4px 8px' }} />
                <div className="dd-item" onClick={handleLogout} style={{ color: 'var(--danger)' }}>
                  <i className="fas fa-sign-out-alt" style={{ width: 20, textAlign: 'center' }} />
                  <span style={{ fontSize: 14 }}>Sign out</span>
                </div>
              </div>
            )}
          </div>
        </div>
      </nav>

      {/* ── Mobile Bottom Nav ── */}
      <div className="mobile-bottom-nav">
        {[
          { id: 'dashboard', icon: 'fa-th-large', label: 'Home' },
          { id: 'chat', icon: 'fa-comments', label: 'Chat' },
          { id: 'schedule', icon: 'fa-calendar-alt', label: 'Schedule' },
          { id: 'timesheets', icon: 'fa-clock', label: 'Time' },
          { id: 'more', icon: 'fa-ellipsis-h', label: 'More' },
        ].map(item => (
          <button key={item.id} className={`mobile-nav-item ${(item.id === 'more' ? ['employees','clients','shifts','checklists','availability','notifications'].includes(page) : page === item.id) ? 'active' : ''}`}
            onClick={() => {
              if (item.id === 'more') {
                setShowMobileMore(!showMobileMore);
              } else {
                setPage(item.id);
                setShowMobileMore(false);
              }
            }}>
            <div style={{ position: 'relative', display: 'inline-block' }}>
              <i className={`fas ${item.icon}`} />
              {item.id === 'chat' && chatUnread > 0 && (
                <span style={{ position: 'absolute', top: -6, right: -8, background: 'var(--danger)', color: '#fff', fontSize: 9, fontWeight: 700, borderRadius: 10, minWidth: 16, height: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 4px' }}>
                  {chatUnread > 99 ? '99+' : chatUnread}
                </span>
              )}
            </div>
            <span>{item.label}</span>
          </button>
        ))}
      </div>

      {/* Mobile "More" menu overlay */}
      {showMobileMore && (
        <div onClick={() => setShowMobileMore(false)} style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.3)', zIndex: 200 }} />
      )}
      {showMobileMore && (
        <div style={{ position: 'fixed', bottom: 68, left: 0, right: 0, background: 'white', borderRadius: '16px 16px 0 0', boxShadow: '0 -4px 20px rgba(0,0,0,0.15)', padding: '12px 8px', zIndex: 201, maxHeight: '60vh', overflowY: 'auto' }}>
          <div style={{ textAlign: 'center', marginBottom: 8 }}>
            <div style={{ width: 32, height: 4, background: 'var(--border)', borderRadius: 2, margin: '0 auto' }} />
          </div>
          {/* Role toggle for mobile */}
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 12 }}>
            <div className="role-toggle">
              <div className={`role-btn ${role === 'admin' ? 'active' : ''}`} onClick={() => setRole('admin')}>Admin</div>
              <div className={`role-btn ${role === 'employee' ? 'active' : ''}`} onClick={() => setRole('employee')}>Employee</div>
            </div>
          </div>
          {(role === 'admin' ? [
            { id: 'shifts', icon: 'fa-exchange-alt', label: 'Shift Swaps', color: '#c8a84e' },
            { id: 'checklists', icon: 'fa-clipboard-check', label: 'Checklists', color: '#b85c4a' },
            { id: 'employees', icon: 'fa-id-badge', label: 'Employees', color: '#7c6f64' },
            { id: 'availability', icon: 'fa-calendar-check', label: 'Availability', color: '#5e8a7a' },
            { id: 'clients', icon: 'fa-building', label: 'Clients', color: '#c8a84e' },
            { id: 'notifications', icon: 'fa-cog', label: 'Settings', color: '#6b7568' },
          ] : [
            { id: 'shifts', icon: 'fa-exchange-alt', label: 'Shift Swaps', color: '#c8a84e' },
            { id: 'checklists', icon: 'fa-clipboard-check', label: 'Checklists', color: '#b85c4a' },
            { id: 'availability', icon: 'fa-calendar-check', label: 'My Availability', color: '#5e8a7a' },
            { id: 'notifications', icon: 'fa-cog', label: 'Settings', color: '#6b7568' },
          ]).map(item => (
            <div key={item.id} className="dd-item" style={{ margin: '0 4px' }}
              onClick={() => { setPage(item.id); setShowMobileMore(false); }}>
              <div className="dd-icon" style={{ background: item.color + '18', color: item.color }}>
                <i className={`fas ${item.icon}`} />
              </div>
              <div className="dd-text">
                <div className="dd-label">{item.label}</div>
              </div>
            </div>
          ))}
          <div style={{ height: 1, background: 'var(--border)', margin: '8px 12px' }} />
          <div className="dd-item" style={{ margin: '0 4px', color: 'var(--danger)' }} onClick={handleLogout}>
            <i className="fas fa-sign-out-alt" style={{ width: 38, textAlign: 'center', fontSize: 16 }} />
            <div className="dd-text"><div className="dd-label" style={{ color: 'var(--danger)' }}>Sign out</div></div>
          </div>
        </div>
      )}

      {/* ── Main Content ── */}
      <div className="main">
        {page !== 'chat' && (
          <div className="page-header">
            <div className="page-header-title">
              {pageTitles[page]}
            </div>
          </div>
        )}
        <div className="content" style={page === 'chat' ? { padding: 0, overflow: 'hidden', display: 'flex', flexDirection: 'column' } : {}}>
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
