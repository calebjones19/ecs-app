  );
}

// ─── Schedule ──────────────────────────────────────────────────
function Schedule({ role }) {
  const [showAddShift, setShowAddShift] = useState(false);
  const [newShift, setNewShift] = useState({ employee: '', day: 0, startTime: '08:00', endTime: '12:00', client: '' });
  const [scheduleData, setScheduleData] = useState(SCHEDULE_DATA);
  const isMobile = window.innerWidth <= 768;
  const [calView, setCalView] = useState(isMobile ? 'day' : 'week'); // day, week, month
  const [groupBy, setGroupBy] = useState('employee'); // employee, client
  const [showLabor, setShowLabor] = useState(!isMobile);
  const [weekOffset, setWeekOffset] = useState(0);
  const [selectedDay, setSelectedDay] = useState(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1); // default to today

  // Date helpers
  const baseDate = new Date(2026, 3, 20); // April 20, 2026 (Mon)
  const getWeekStart = () => {
    const d = new Date(baseDate);
    d.setDate(d.getDate() + weekOffset * 7);
    return d;
  };
  const weekStart = getWeekStart();
  const isCurrentWeek = weekOffset === 0;

  const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const getWeekDays = () => {
    return Array.from({length: 7}, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      return { label: `${dayNames[i]} ${d.getMonth()+1}/${d.getDate()}`, date: d, dayIndex: i };
    });
  };
  const weekDays = getWeekDays();

  const getWeekLabel = () => {
    const end = new Date(weekStart);
    end.setDate(end.getDate() + 6);
    return `${monthNames[weekStart.getMonth()]} ${weekStart.getDate()} – ${monthNames[end.getMonth()]} ${end.getDate()}, ${end.getFullYear()}`;
  };

  const getDayLabel = () => {
    const d = weekDays[selectedDay];
    return d ? `${dayNames[selectedDay]}, ${monthNames[d.date.getMonth()]} ${d.date.getDate()}, ${d.date.getFullYear()}` : '';
  };

  const getMonthLabel = () => {
    return `${monthNames[weekStart.getMonth()]} ${weekStart.getFullYear()}`;
  };

  // Parse shift hours from time string like "8a-12p" or "1p-5p"
  const parseShiftHours = (timeStr) => {
    const match = timeStr.match(/(\d+)(a|p)-(\d+)(a|p)/);
    if (!match) return 4;
    let start = parseInt(match[1]);
    if (match[2] === 'p' && start !== 12) start += 12;
    if (match[2] === 'a' && start === 12) start = 0;
    let end = parseInt(match[3]);
    if (match[4] === 'p' && end !== 12) end += 12;
    if (match[4] === 'a' && end === 12) end = 0;
    return end - start;
  };

  // Compute labor hours for a given day index
  const getLaborForDay = (dayIndex) => {
    let scheduled = 0;
    let actual = 0;
    Object.values(scheduleData).forEach(shifts => {
      shifts.filter(s => s.day === dayIndex).forEach(s => {
        const hrs = parseShiftHours(s.time);
        scheduled += hrs;
        // Mock actual: slightly different for past days, 0 for future
        if (weekOffset === 0) {
          if (dayIndex < 3) actual += hrs + (Math.random() > 0.5 ? 0.25 : -0.25);
          else if (dayIndex === 3) actual += hrs * 0.6; // partial day
        } else if (weekOffset < 0) {
          actual += hrs + (Math.random() > 0.5 ? 0.15 : -0.1);
        }
      });
    });
    return { scheduled: Math.round(scheduled * 10) / 10, actual: Math.round(actual * 10) / 10 };
  };

  // Build client-grouped data
  const getClientGroups = () => {
    const clientMap = {};
    Object.entries(scheduleData).forEach(([empId, shifts]) => {
      const emp = EMPLOYEES.find(e => e.id === parseInt(empId));
      if (!emp || emp.status !== 'active') return;
      shifts.forEach(s => {
        if (!clientMap[s.client]) clientMap[s.client] = [];
        clientMap[s.client].push({ ...s, empId: parseInt(empId), empName: emp.name, empAvatar: emp.avatar, empColor: emp.color });
      });
    });
    return clientMap;
  };

  // Get month calendar data
  const getMonthDays = () => {
    const year = weekStart.getFullYear();
    const month = weekStart.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    let startDow = firstDay.getDay();
    startDow = startDow === 0 ? 6 : startDow - 1; // Mon = 0
    const days = [];
    // pad start
    for (let i = 0; i < startDow; i++) {
      const d = new Date(firstDay);
      d.setDate(d.getDate() - (startDow - i));
      days.push({ date: d, inMonth: false });
    }
    for (let i = 1; i <= lastDay.getDate(); i++) {
      days.push({ date: new Date(year, month, i), inMonth: true });
    }
    // pad end
    while (days.length % 7 !== 0) {
      const d = new Date(lastDay);
      d.setDate(d.getDate() + (days.length - startDow - lastDay.getDate() + 1));
      days.push({ date: d, inMonth: false });
    }
    return days;
  };

  // Count shifts for a given calendar date (map to day-of-week index relative to week)
  const getShiftsForDate = (date) => {
    const dow = date.getDay();
    const dayIndex = dow === 0 ? 6 : dow - 1;
    // Only show data for the base week period as demo
    const baseWeekStart = new Date(2026, 3, 20);
    const baseWeekEnd = new Date(2026, 3, 27);
    if (date >= baseWeekStart && date < baseWeekEnd) {
      let count = 0;
      let clients = new Set();
      Object.values(scheduleData).forEach(shifts => {
        shifts.filter(s => s.day === dayIndex).forEach(s => { count++; clients.add(s.client); });
      });
      return { count, clients: Array.from(clients) };
    }
    return { count: 0, clients: [] };
  };

  // Labor hours bar
  const LaborBar = ({ dayIndex }) => {
    if (!showLabor) return null;
    const { scheduled, actual } = getLaborForDay(dayIndex);
    const max = Math.max(scheduled, actual, 1);
    return (
      <div style={{ padding: '4px 6px', borderBottom: '1px solid var(--border)', background: '#f9fafb', minHeight: 36 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, marginBottom: 2, color: 'var(--text-light)' }}>
          <span>{actual > 0 ? `${actual}h actual` : '—'}</span>
          <span>{scheduled}h sched</span>
        </div>
        <div style={{ display: 'flex', gap: 2, height: 6 }}>
          <div style={{ flex: actual / max, background: actual > scheduled ? 'var(--danger)' : 'var(--success)', borderRadius: 3, transition: 'flex 0.3s' }} title={`Actual: ${actual}h`} />
          <div style={{ flex: (scheduled - actual) / max, background: actual > 0 ? '#e5e7eb' : 'var(--primary-light)', borderRadius: 3, transition: 'flex 0.3s' }} title={`Remaining: ${Math.max(0, scheduled - actual)}h`} />
        </div>
      </div>
    );
  };

  const goToToday = () => { setWeekOffset(0); setSelectedDay(new Date().getDay() === 0 ? 6 : new Date().getDay() - 1); };

  // Open add-shift modal pre-populated with context from the clicked cell
  const openAddShift = (opts = {}) => {
    setNewShift({
      employee: opts.employee || '',
      day: opts.day != null ? opts.day : selectedDay,
      startTime: opts.startTime || '08:00',
      endTime: opts.endTime || '12:00',
      client: opts.client || '',
    });
    setShowAddShift(true);
  };

  // Actually add the shift to local state
  const confirmAddShift = () => {
    if (!newShift.employee || !newShift.client) return;
    const empId = parseInt(newShift.employee);
    const dayIdx = parseInt(newShift.day);
    // Convert 24h times to display format
    const fmtTime = (t) => {
      const [h, m] = t.split(':').map(Number);
      if (h === 0) return '12a';
      if (h < 12) return `${h}a`;
      if (h === 12) return '12p';
      return `${h - 12}p`;
    };
    const timeLabel = `${fmtTime(newShift.startTime)}-${fmtTime(newShift.endTime)}`;
    const startH = parseInt(newShift.startTime.split(':')[0]);
    const type = startH < 12 ? 'morning' : startH < 17 ? 'afternoon' : 'evening';
    // Find matching client short name
    const clientObj = CLIENTS.find(c => c.name === newShift.client);
    const clientShort = clientObj ? clientObj.name : newShift.client;

    const updated = { ...scheduleData };
    if (!updated[empId]) updated[empId] = [];
    updated[empId] = [...updated[empId], { day: dayIdx, time: timeLabel, client: clientShort, type }];
    setScheduleData(updated);
    setShowAddShift(false);
  };

  // ── Day View ──
  const renderDayView = () => {
    const dayIndex = selectedDay;
    const dayInfo = weekDays[dayIndex];
    const allShifts = [];
    Object.entries(scheduleData).forEach(([empId, shifts]) => {
      const emp = EMPLOYEES.find(e => e.id === parseInt(empId));
      if (!emp || emp.status !== 'active') return;
      shifts.filter(s => s.day === dayIndex).forEach(s => {
        allShifts.push({ ...s, emp });
      });
    });

    if (groupBy === 'client') {
      const byClient = {};
      allShifts.forEach(s => {
        if (!byClient[s.client]) byClient[s.client] = [];
        byClient[s.client].push(s);
      });
      return (
        <div>
          {showLabor && (() => {
            const { scheduled, actual } = getLaborForDay(dayIndex);
            return (
              <div className="card" style={{ padding: '12px 16px', marginBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div style={{ display: 'flex', gap: 24 }}>
                  <div><span style={{ fontSize: 24, fontWeight: 700, color: 'var(--primary)' }}>{scheduled}h</span><div style={{ fontSize: 12, color: 'var(--text-light)' }}>Scheduled</div></div>
                  <div><span style={{ fontSize: 24, fontWeight: 700, color: actual > scheduled ? 'var(--danger)' : 'var(--success)' }}>{actual}h</span><div style={{ fontSize: 12, color: 'var(--text-light)' }}>Actual</div></div>
                </div>
                <div style={{ width: '100%', maxWidth: 200, height: 8, background: '#e2e0db', borderRadius: 4, overflow: 'hidden' }}>
                  <div style={{ width: `${Math.min(100, (actual / Math.max(scheduled, 1)) * 100)}%`, height: '100%', background: actual > scheduled ? 'var(--danger)' : 'var(--success)', borderRadius: 4, transition: 'width 0.3s' }} />
                </div>
              </div>
            );
          })()}
          {Object.entries(byClient).map(([client, shifts]) => (
            <div className="card" key={client} style={{ marginBottom: 12 }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
                <i className="fas fa-building" style={{ color: 'var(--primary)' }} />{client}
              </div>
              {shifts.map((s, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 0', borderTop: i > 0 ? '1px solid var(--border)' : 'none' }}>
                  <div className="avatar sm" style={{ background: s.emp.color }}>{s.emp.avatar}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 14 }}>{s.emp.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-light)' }}>{s.emp.role}</div>
                  </div>
                  <div className={`schedule-shift ${s.type}`} style={{ margin: 0 }}>
                    <div className="shift-time">{s.time}</div>
                  </div>
                </div>
              ))}
            </div>
          ))}
          {role === 'admin' && (
            <div className="card" style={{ marginBottom: 12, padding: '14px 16px', cursor: 'pointer', border: '2px dashed var(--border)', background: '#f7f6f3', textAlign: 'center', color: 'var(--text-light)', transition: 'all 0.15s' }}
              onClick={() => openAddShift({ day: dayIndex })}
              onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--primary)'; e.currentTarget.style.color = 'var(--primary)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--text-light)'; }}>
              <i className="fas fa-plus" style={{ marginRight: 6 }} /> Add shift for {dayNames[dayIndex]}
            </div>
          )}
          {allShifts.length === 0 && (
            <div className="empty-state"><i className="fas fa-calendar-day" /><h3>No shifts scheduled</h3><p>{role === 'admin' ? 'Click above or on any empty space to add a shift.' : 'No one is scheduled for this day.'}</p></div>
          )}
        </div>
      );
    }

    // Group by employee (day view)
    return (
      <div>
        {showLabor && (() => {
          const { scheduled, actual } = getLaborForDay(dayIndex);
          return (
            <div className="card" style={{ padding: '12px 16px', marginBottom: 16, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ display: 'flex', gap: 24 }}>
                <div><span style={{ fontSize: 24, fontWeight: 700, color: 'var(--primary)' }}>{scheduled}h</span><div style={{ fontSize: 12, color: 'var(--text-light)' }}>Scheduled</div></div>
                <div><span style={{ fontSize: 24, fontWeight: 700, color: actual > scheduled ? 'var(--danger)' : 'var(--success)' }}>{actual}h</span><div style={{ fontSize: 12, color: 'var(--text-light)' }}>Actual</div></div>
              </div>
              <div style={{ width: '100%', maxWidth: 200, height: 8, background: '#e5e7eb', borderRadius: 4, overflow: 'hidden' }}>
                <div style={{ width: `${Math.min(100, (actual / Math.max(scheduled, 1)) * 100)}%`, height: '100%', background: actual > scheduled ? 'var(--danger)' : 'var(--success)', borderRadius: 4, transition: 'width 0.3s' }} />
              </div>
            </div>
          );
        })()}
        {allShifts.map((s, i) => (
          <div className="card" key={i} style={{ padding: '14px 16px', marginBottom: 8, display: 'flex', alignItems: 'center', gap: 14 }}>
            <div className="avatar" style={{ background: s.emp.color }}>{s.emp.avatar}</div>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{s.emp.name}</div>
              <div style={{ fontSize: 13, color: 'var(--text-light)' }}>{s.emp.role}</div>
            </div>
            <div style={{ textAlign: 'right', marginRight: 12 }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{s.client}</div>
              <div style={{ fontSize: 12, color: 'var(--text-light)' }}><i className="fas fa-building" style={{ marginRight: 4 }} />Client</div>
            </div>
            <div className={`schedule-shift ${s.type}`} style={{ margin: 0, minWidth: 80 }}>
              <div className="shift-time">{s.time}</div>
            </div>
            {role === 'employee' && (
              <button className="chat-icon-btn" title="Request swap"><i className="fas fa-exchange-alt" /></button>
            )}
          </div>
        ))}
        {role === 'admin' && (
          <div className="card" style={{ padding: '14px 16px', cursor: 'pointer', border: '2px dashed var(--border)', background: '#fafbfc', textAlign: 'center', color: 'var(--text-light)', transition: 'all 0.15s' }}
            onClick={() => openAddShift({ day: dayIndex })}
            onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--primary)'; e.currentTarget.style.color = 'var(--primary)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; e.currentTarget.style.color = 'var(--text-light)'; }}>
            <i className="fas fa-plus" style={{ marginRight: 6 }} /> Add shift for {dayNames[dayIndex]}
          </div>
        )}
        {allShifts.length === 0 && (
          <div className="empty-state"><i className="fas fa-calendar-day" /><h3>No shifts scheduled</h3><p>{role === 'admin' ? 'Click the button above to add a shift.' : 'No one is scheduled for this day.'}</p></div>
        )}
      </div>
    );
  };

  // ── Week View ──
  const renderWeekView = () => {
    if (groupBy === 'client') {
      const clientGroups = getClientGroups();
      return (
        <div className="schedule-grid" style={{ gridTemplateColumns: `200px repeat(7, 1fr)` }}>
          <div className="schedule-header">Client</div>
          {weekDays.map(d => <div className="schedule-header" key={d.label}>{d.label}</div>)}

          {showLabor && (
            <React.Fragment>
              <div style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', borderRight: '1px solid var(--border)', background: '#f9fafb', display: 'flex', alignItems: 'center' }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-light)' }}>LABOR HOURS</span>
              </div>
              {[0,1,2,3,4,5,6].map(day => <LaborBar key={day} dayIndex={day} />)}
            </React.Fragment>
          )}

          {Object.entries(clientGroups).map(([clientName, shifts]) => (
            <React.Fragment key={clientName}>
              <div className="schedule-employee">
                <i className="fas fa-building" style={{ color: 'var(--primary)', fontSize: 16 }} />
                <div>
                  <div style={{ fontWeight: 600, fontSize: 12 }}>{clientName}</div>
                </div>
              </div>
              {[0,1,2,3,4,5,6].map(day => {
                const dayShifts = shifts.filter(s => s.day === day);
                return (
                  <div className="schedule-cell" key={day}
                    onClick={(e) => { if (role === 'admin' && e.target === e.currentTarget) openAddShift({ day, client: clientName }); }}>
                    {dayShifts.map((s, i) => (
                      <div className={`schedule-shift ${s.type}`} key={i} title={s.empName}>
                        <div className="shift-time">{s.time}</div>
                        <div className="shift-client">{s.empName.split(' ')[0]}</div>
                      </div>
                    ))}
                    {role === 'admin' && <button className="cell-add-btn" onClick={(e) => { e.stopPropagation(); openAddShift({ day, client: clientName }); }}><i className="fas fa-plus" /></button>}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
      );
    }

    // Group by employee (week view — original)
    return (
      <div className="schedule-grid" style={{ gridTemplateColumns: `200px repeat(7, 1fr)` }}>
        <div className="schedule-header">Employee</div>
        {weekDays.map(d => <div className="schedule-header" key={d.label}>{d.label}</div>)}

        {showLabor && (
          <React.Fragment>
            <div style={{ padding: '4px 8px', borderBottom: '1px solid var(--border)', borderRight: '1px solid var(--border)', background: '#f9fafb', display: 'flex', alignItems: 'center' }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--text-light)' }}>LABOR HOURS</span>
            </div>
            {[0,1,2,3,4,5,6].map(day => <LaborBar key={day} dayIndex={day} />)}
          </React.Fragment>
        )}

        {EMPLOYEES.filter(e => e.status === 'active').map(emp => (
          <React.Fragment key={emp.id}>
            <div className="schedule-employee">
              <div className="avatar sm" style={{ background: emp.color }}>{emp.avatar}</div>
              <div>
                <div style={{ fontWeight: 600 }}>{emp.name.split(' ')[0]}</div>
                <div style={{ fontSize: 11, color: 'var(--text-light)' }}>{emp.role}</div>
              </div>
            </div>
            {[0,1,2,3,4,5,6].map(day => {
              const shifts = (scheduleData[emp.id] || []).filter(s => s.day === day);
              return (
                <div className="schedule-cell" key={day}
                  onClick={(e) => { if (role === 'admin' && e.target === e.currentTarget) openAddShift({ day, employee: String(emp.id) }); }}>
                  {shifts.map((s, i) => (
                    <div className={`schedule-shift ${s.type}`} key={i}>
                      <div className="shift-time">{s.time}</div>
                      <div className="shift-client">{s.client}</div>
                      {role === 'employee' && <span className="swap-icon" title="Request swap"><i className="fas fa-exchange-alt" /></span>}
                    </div>
                  ))}
                  {role === 'admin' && <button className="cell-add-btn" onClick={(e) => { e.stopPropagation(); openAddShift({ day, employee: String(emp.id) }); }}><i className="fas fa-plus" /></button>}
                </div>
              );
            })}
          </React.Fragment>
        ))}
      </div>
    );
  };

  // ── Month View ──
  const renderMonthView = () => {
    const monthDays = getMonthDays();
    const today = new Date(2026, 3, 17); // mock today

    return (
      <div>
        {showLabor && (
          <div className="card" style={{ padding: '12px 16px', marginBottom: 16 }}>
            <div style={{ display: 'flex', gap: 24, alignItems: 'center' }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--text-light)' }}>MONTH TOTALS</span>
              <div><span style={{ fontSize: 20, fontWeight: 700, color: 'var(--primary)' }}>~640h</span><span style={{ fontSize: 12, color: 'var(--text-light)', marginLeft: 4 }}>scheduled</span></div>
              <div><span style={{ fontSize: 20, fontWeight: 700, color: 'var(--success)' }}>~412h</span><span style={{ fontSize: 12, color: 'var(--text-light)', marginLeft: 4 }}>actual (MTD)</span></div>
            </div>
          </div>
        )}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden', background: 'white' }}>
          {dayNames.map(d => (
            <div key={d} style={{ padding: 10, textAlign: 'center', fontWeight: 600, fontSize: 12, background: 'var(--bg)', borderBottom: '1px solid var(--border)', color: 'var(--text-light)' }}>{d}</div>
          ))}
          {monthDays.map((md, i) => {
            const info = getShiftsForDate(md.date);
            const isToday = md.date.getDate() === today.getDate() && md.date.getMonth() === today.getMonth();
            const dow = md.date.getDay();
            const dayIdx = dow === 0 ? 6 : dow - 1;
            return (
              <div key={i} className="month-cell" style={{
                minHeight: 90, padding: 8, borderBottom: '1px solid var(--border)', borderRight: (i + 1) % 7 !== 0 ? '1px solid var(--border)' : 'none',
                background: !md.inMonth ? '#f9fafb' : isToday ? 'var(--primary-light)' : 'white',
                opacity: md.inMonth ? 1 : 0.4,
              }}
              onClick={() => {
                if (md.inMonth && info.count > 0) {
                  setSelectedDay(dayIdx);
                  setCalView('day');
                }
              }}>
                <div style={{ fontWeight: isToday ? 700 : 500, fontSize: 13, marginBottom: 4, color: isToday ? 'var(--primary)' : 'var(--text)' }}>
                  {isToday ? (
                    <span style={{ background: 'var(--primary)', color: 'white', width: 24, height: 24, borderRadius: '50%', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', fontSize: 12 }}>
                      {md.date.getDate()}
                    </span>
                  ) : md.date.getDate()}
                </div>
                {info.count > 0 && (
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--primary)', marginBottom: 2 }}>{info.count} shift{info.count > 1 ? 's' : ''}</div>
                    {info.clients.slice(0, 2).map((c, j) => (
                      <div key={j} style={{ fontSize: 10, color: 'var(--text-light)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c}</div>
                    ))}
                    {info.clients.length > 2 && <div style={{ fontSize: 10, color: 'var(--text-light)' }}>+{info.clients.length - 2} more</div>}
                  </div>
                )}
                {role === 'admin' && md.inMonth && (
                  <button className="cell-add-btn" onClick={(e) => { e.stopPropagation(); openAddShift({ day: dayIdx }); }}>
                    <i className="fas fa-plus" />
                  </button>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── Day mini-selector for day view ──
  const DayTabs = () => (
    <div style={{ display: 'flex', gap: 4, marginBottom: 16 }}>
      {weekDays.map((d, i) => (
        <div key={i} onClick={() => setSelectedDay(i)} style={{
          flex: 1, textAlign: 'center', padding: '8px 4px', borderRadius: 8, cursor: 'pointer',
          background: selectedDay === i ? 'var(--primary)' : 'white',
          color: selectedDay === i ? 'white' : 'var(--text)',
          border: `1px solid ${selectedDay === i ? 'var(--primary)' : 'var(--border)'}`,
          fontWeight: selectedDay === i ? 700 : 400, fontSize: 13, transition: 'all 0.15s',
        }}>
          <div style={{ fontSize: 11, opacity: 0.7 }}>{dayNames[i]}</div>
          <div>{d.date.getDate()}</div>
        </div>
      ))}
    </div>
  );

  return (
    <div>
      {/* ── Toolbar ── */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12, flexWrap: 'wrap', gap: 8 }}>
        {/* Left: navigation */}
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap', flex: 1, minWidth: 0 }}>
          <button className="topbar-btn" onClick={() => setWeekOffset(w => w - 1)}><i className="fas fa-chevron-left" /></button>
          <button className="topbar-btn" onClick={goToToday} style={{ fontWeight: 600, color: isCurrentWeek ? 'var(--primary)' : undefined }}>
            Today
          </button>
          <button className="topbar-btn" onClick={() => setWeekOffset(w => w + 1)}><i className="fas fa-chevron-right" /></button>
          <span style={{ fontWeight: 700, fontSize: isMobile ? 14 : 16, marginLeft: 4 }}>
            {calView === 'day' ? getDayLabel() : calView === 'week' ? getWeekLabel() : getMonthLabel()}
          </span>
        </div>

        {/* Right: controls — simplified on mobile */}
        <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap' }}>
          {/* View mode toggle — desktop only */}
          {!isMobile && (
            <div style={{ display: 'flex', background: 'var(--bg)', borderRadius: 8, border: '1px solid var(--border)', overflow: 'hidden' }}>
              {['day', 'week', 'month'].map(v => (
                <button key={v} onClick={() => setCalView(v)} style={{
                  padding: '6px 14px', border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: calView === v ? 700 : 400,
                  background: calView === v ? 'var(--primary)' : 'transparent', color: calView === v ? 'white' : 'var(--text)',
                  transition: 'all 0.15s',
                }}>
                  {v.charAt(0).toUpperCase() + v.slice(1)}
                </button>
              ))}
            </div>
          )}

          {/* Group by toggle — desktop only */}
          {!isMobile && (
            <div style={{ display: 'flex', background: 'var(--bg)', borderRadius: 8, border: '1px solid var(--border)', overflow: 'hidden' }}>
              {['employee', 'client'].map(g => (
                <button key={g} onClick={() => setGroupBy(g)} style={{
                  padding: '6px 14px', border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: groupBy === g ? 700 : 400,
                  background: groupBy === g ? 'var(--primary)' : 'transparent', color: groupBy === g ? 'white' : 'var(--text)',
                  transition: 'all 0.15s',
                }}>
                  <i className={`fas ${g === 'employee' ? 'fa-user' : 'fa-building'}`} style={{ marginRight: 6 }} />
                  {g === 'employee' ? 'By Employee' : 'By Client'}
                </button>
              ))}
            </div>
          )}

          {/* Labor hours toggle — desktop only */}
          {!isMobile && (
            <button className="topbar-btn" onClick={() => setShowLabor(!showLabor)} style={{ color: showLabor ? 'var(--primary)' : undefined, borderColor: showLabor ? 'var(--primary)' : undefined }}>
              <i className="fas fa-chart-bar" /> Labor
            </button>
          )}

          {role === 'admin' && (
            <button className="topbar-btn primary" onClick={() => setShowAddShift(true)}><i className="fas fa-plus" />{isMobile ? '' : ' Add Shift'}</button>
          )}
          {role === 'admin' && !isMobile && (
            <React.Fragment>
              <button className="topbar-btn"><i className="fas fa-bell" /> Notify All</button>
              <button className="topbar-btn"><i className="fas fa-download" /> Export</button>
            </React.Fragment>
          )}
        </div>
      </div>

      {/* ── Calendar Body ── */}
      {calView === 'day' && <DayTabs />}
      {calView === 'day' && renderDayView()}
      {calView === 'week' && !isMobile && renderWeekView()}
      {calView === 'month' && !isMobile && renderMonthView()}

      {/* Legend */}
      {calView !== 'month' && (
        <div style={{ marginTop: 16, display: 'flex', gap: 16, fontSize: 12, color: 'var(--text-light)', flexWrap: 'wrap' }}>
          <span><span style={{ display: 'inline-block', width: 12, height: 12, background: '#dceee4', borderLeft: '3px solid #2d6a4f', borderRadius: 2, marginRight: 4 }} /> Morning</span>
          <span><span style={{ display: 'inline-block', width: 12, height: 12, background: '#faf3e0', borderLeft: '3px solid #c8a84e', borderRadius: 2, marginRight: 4 }} /> Afternoon</span>
          <span><span style={{ display: 'inline-block', width: 12, height: 12, background: '#f0ebe4', borderLeft: '3px solid #7c6f64', borderRadius: 2, marginRight: 4 }} /> Evening</span>
          {showLabor && (
            <React.Fragment>
              <span style={{ marginLeft: 8 }}>|</span>
              <span><span style={{ display: 'inline-block', width: 12, height: 12, background: 'var(--success)', borderRadius: 2, marginRight: 4 }} /> Actual (on/under)</span>
              <span><span style={{ display: 'inline-block', width: 12, height: 12, background: 'var(--danger)', borderRadius: 2, marginRight: 4 }} /> Actual (over)</span>
              <span><span style={{ display: 'inline-block', width: 12, height: 12, background: '#e5e7eb', borderRadius: 2, marginRight: 4 }} /> Remaining</span>
            </React.Fragment>
          )}
        </div>
      )}

      {/* Add Shift Modal */}
      <Modal show={showAddShift} onClose={() => setShowAddShift(false)} title="Add Shift">
        <div className="form-group">
          <label className="form-label">Employee</label>
          <select className="form-input" value={newShift.employee} onChange={e => setNewShift({...newShift, employee: e.target.value})}
            style={newShift.employee ? { borderColor: 'var(--success)' } : {}}>
            <option value="">Select employee...</option>
            {EMPLOYEES.filter(e => e.status === 'active').map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label className="form-label">Day</label>
          <select className="form-input" value={newShift.day} onChange={e => setNewShift({...newShift, day: parseInt(e.target.value)})}>
            {weekDays.map((d, i) => <option key={i} value={i}>{d.label}</option>)}
          </select>
        </div>
        <div className="grid-2">
          <div className="form-group">
            <label className="form-label">Start Time</label>
            <input type="time" className="form-input" value={newShift.startTime} onChange={e => setNewShift({...newShift, startTime: e.target.value})} />
          </div>
          <div className="form-group">
            <label className="form-label">End Time</label>
            <input type="time" className="form-input" value={newShift.endTime} onChange={e => setNewShift({...newShift, endTime: e.target.value})} />
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Client / Location</label>
          <select className="form-input" value={newShift.client} onChange={e => setNewShift({...newShift, client: e.target.value})}
            style={newShift.client ? { borderColor: 'var(--success)' } : {}}>
            <option value="">Select client...</option>
            {CLIENTS.filter(c => c.status === 'active').map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
          </select>
        </div>
        {(!newShift.employee || !newShift.client) && (
          <div style={{ padding: '8px 12px', background: '#faf3e0', borderRadius: 8, fontSize: 12, color: '#8a6d2b', marginBottom: 12 }}>
            <i className="fas fa-info-circle" style={{ marginRight: 6 }} />
            Select both an employee and a client to add the shift.
          </div>
        )}
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          <button className="topbar-btn" onClick={() => setShowAddShift(false)}>Cancel</button>
          <button className="topbar-btn primary" onClick={confirmAddShift}
            style={(!newShift.employee || !newShift.client) ? { opacity: 0.5, pointerEvents: 'none' } : {}}>
            <i className="fas fa-plus" /> Add Shift
          </button>
        </div>
      </Modal>
    </div>
  );
}

// ─── Clients ───────────────────────────────────────────────────
function ClientList({ role }) {
  const [search, setSearch] = useState('');
  const [showAdd, setShowAdd] = useState(false);
  const [selectedClient, setSelectedClient] = useState(null);
  const [saving, setSaving] = useState(false);
  const [editClient, setEditClient] = useState({});
  const [editClientDirty, setEditClientDirty] = useState(false);
  const [newClient, setNewClient] = useState({ name:'', contact:'', phone:'', email:'', address:'', type:'Commercial', frequency:'Weekly', rate:'', notes:'' });

  // Sync edit state when selected client changes
  useEffect(() => {
    if (selectedClient) {
      setEditClient({ ...selectedClient });
      setEditClientDirty(false);
    }
  }, [selectedClient?.id]);

  const handleEditClientField = (field, value) => {
    setEditClient(prev => ({ ...prev, [field]: value }));
    setEditClientDirty(true);
  };

  const handleSaveClient = async () => {
    if (!selectedClient?.id) return;
    setSaving(true);
    try {
      await db.collection('clients').doc(selectedClient.id).update({
        name: (editClient.name || '').trim(),
        contact: (editClient.contact || '').trim(),
        phone: (editClient.phone || '').trim(),
        email: (editClient.email || '').trim(),
        address: (editClient.address || '').trim(),
        type: editClient.type || 'Commercial',
        frequency: editClient.frequency || 'Weekly',
        rate: parseFloat(editClient.rate) || 0,
        notes: (editClient.notes || '').trim(),
        status: editClient.status || 'active',
      });
      setEditClientDirty(false);
      setSelectedClient({ ...selectedClient, ...editClient, rate: parseFloat(editClient.rate) || 0 });
    } catch (err) {
      alert('Error saving: ' + err.message);
    }
    setSaving(false);
  };

  const handleDeleteClient = async (clientId) => {
    if (!confirm('Remove this client? This cannot be undone.')) return;
    try {
      await db.collection('clients').doc(clientId).delete();
      setSelectedClient(null);
    } catch (err) {
      alert('Error removing client: ' + err.message);
    }
  };

  const handleAddClient = async () => {
    if (!newClient.name.trim()) return;
    setSaving(true);
    try {
      await db.collection('clients').add({
        ...newClient,
        name: newClient.name.trim(),
        rate: parseFloat(newClient.rate) || 0,
        status: 'active',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setShowAdd(false);
      setNewClient({ name:'', contact:'', phone:'', email:'', address:'', type:'Commercial', frequency:'Weekly', rate:'', notes:'' });
    } catch (err) {
      alert('Error adding client: ' + err.message);
    }
    setSaving(false);
  };

  const filtered = CLIENTS.filter(c =>
    c.name.toLowerCase().includes(search.toLowerCase()) ||
    (c.contact || '').toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <div className="search-bar" style={{ flex: 1, minWidth: 180 }}>
          <i className="fas fa-search" />
          <input placeholder="Search clients..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        {role === 'admin' && (
          <button className="topbar-btn primary" onClick={() => setShowAdd(true)}><i className="fas fa-plus" /> Add Client</button>
        )}
      </div>
      {/* Desktop table */}
      <div className="card desktop-only" style={{ padding: 0 }}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Client</th>
                <th>Contact</th>
                <th>Type</th>
                <th>Frequency</th>
                <th>Rate</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c => (
                <tr key={c.id}>
                  <td>
                    <div style={{ fontWeight: 600 }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-light)' }}>{c.address}</div>
                  </td>
                  <td>
                    <div>{c.contact}</div>
                    <div style={{ fontSize: 12, color: 'var(--text-light)' }}>{c.phone}</div>
                  </td>
                  <td><span className={`badge ${c.type === 'Commercial' ? 'blue' : c.type === 'Medical' ? 'purple' : 'green'}`}>{c.type}</span></td>
                  <td>{c.frequency}</td>
                  <td style={{ fontWeight: 600 }}>${c.rate}</td>
                  <td><span className={`badge ${c.status === 'active' ? 'green' : 'yellow'}`}>{c.status}</span></td>
                  <td>
                    <button className="chat-icon-btn" onClick={() => setSelectedClient(c)}><i className="fas fa-eye" /></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {/* Mobile list — name only, tap to view details */}
      <div className="mobile-only">
        {filtered.map(c => (
          <div key={c.id} className="card" onClick={() => setSelectedClient(c)}
            style={{ padding: '14px 16px', marginBottom: 8, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 36, height: 36, borderRadius: '50%', background: (c.type === 'Commercial' ? '#e3f2fd' : c.type === 'Medical' ? '#f3e5f5' : '#e8f5e9'), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <i className={`fas ${c.type === 'Commercial' ? 'fa-building' : c.type === 'Medical' ? 'fa-hospital' : 'fa-home'}`} style={{ fontSize: 14, color: (c.type === 'Commercial' ? '#1976d2' : c.type === 'Medical' ? '#7b1fa2' : '#388e3c') }} />
              </div>
              <div style={{ fontWeight: 600, fontSize: 15 }}>{c.name}</div>
            </div>
            <i className="fas fa-chevron-right" style={{ fontSize: 12, color: 'var(--text-light)' }} />
          </div>
        ))}
      </div>

      <Modal show={!!selectedClient} onClose={() => setSelectedClient(null)} title={editClient.name || selectedClient?.name || ''}>
        {selectedClient && (
          <div>
            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Client Name</label>
                <input className="form-input" value={editClient.name || ''} onChange={e => handleEditClientField('name', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Contact Person</label>
                <input className="form-input" value={editClient.contact || ''} onChange={e => handleEditClientField('contact', e.target.value)} />
              </div>
            </div>
            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Phone</label>
                <input className="form-input" value={editClient.phone || ''} onChange={e => handleEditClientField('phone', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Email</label>
                <input className="form-input" value={editClient.email || ''} onChange={e => handleEditClientField('email', e.target.value)} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Address</label>
              <input className="form-input" value={editClient.address || ''} onChange={e => handleEditClientField('address', e.target.value)} />
            </div>
            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Type</label>
                <select className="form-input" value={editClient.type || 'Commercial'} onChange={e => handleEditClientField('type', e.target.value)}>
                  <option>Commercial</option>
                  <option>Residential</option>
                  <option>Medical</option>
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Frequency</label>
                <select className="form-input" value={editClient.frequency || 'Weekly'} onChange={e => handleEditClientField('frequency', e.target.value)}>
                  <option>Daily</option>
                  <option>Weekly</option>
                  <option>Bi-weekly</option>
                  <option>Monthly</option>
                  <option>On-demand</option>
                </select>
              </div>
            </div>
            <div className="grid-2">
              <div className="form-group">
                <label className="form-label">Rate ($)</label>

// ─── Employee Profiles ─────────────────────────────────────────
function EmployeeProfiles({ role }) {
  const [selectedEmp, setSelectedEmp] = useState(null);
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState('all');
  const [profileTab, setProfileTab] = useState('info');
  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving] = useState(false);
  const [editData, setEditData] = useState({});
  const [editDirty, setEditDirty] = useState(false);
  const [newEmp, setNewEmp] = useState({ name: '', phone: '', email: '', role: 'Cleaner', type: 'employee', payRate: '', address: '', emergencyContact: '' });

  // Sync editData when selectedEmp changes
  useEffect(() => {
    if (selectedEmp) {
      setEditData({ ...selectedEmp });
      setEditDirty(false);
    }
  }, [selectedEmp?.id]);

  const handleEditField = (field, value) => {
    setEditData(prev => ({ ...prev, [field]: value }));
    setEditDirty(true);
  };

  const handleSaveProfile = async () => {
    if (!selectedEmp?.id) return;
    setSaving(true);
    try {
      const phoneDigits = (editData.phone || '').replace(/\D/g, '').slice(-10);
      const initials = (editData.name || '').trim().split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
      await db.collection('employees').doc(selectedEmp.id).update({
        name: (editData.name || '').trim(),
        phone: (editData.phone || '').trim(),
        phoneNormalized: phoneDigits,
        email: (editData.email || '').trim().toLowerCase(),
        role: editData.role || selectedEmp.role,
        type: editData.type || selectedEmp.type,
        payRate: parseFloat(editData.payRate) || 0,
        address: (editData.address || '').trim(),
        emergencyContact: (editData.emergencyContact || '').trim(),
        avatar: initials || selectedEmp.avatar,
        status: editData.status || selectedEmp.status,
      });
      setEditDirty(false);
      // Update local selectedEmp to reflect saved data
      setSelectedEmp({ ...selectedEmp, ...editData, phoneNormalized: phoneDigits, avatar: initials || selectedEmp.avatar });
    } catch (err) {
      alert('Error saving: ' + err.message);
    }
    setSaving(false);
  };

  const handleAddEmployee = async () => {
    if (!newEmp.name.trim() || !newEmp.phone.trim()) return;
    setSaving(true);
    const phoneDigits = newEmp.phone.replace(/\D/g, '').slice(-10);
    const initials = newEmp.name.trim().split(' ').map(n => n[0]).join('').toUpperCase().slice(0,2);
    const colors = ['#2d6a4f','#5a8a4a','#c8a84e','#7c6f64','#b85c4a','#5e8a7a','#a67c6d','#6b8f5e'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    try {
      await db.collection('employees').add({
        name: newEmp.name.trim(),
        phone: newEmp.phone.trim(),
        phoneNormalized: phoneDigits,
        email: newEmp.email.trim(),
        role: newEmp.role,
        type: newEmp.type,
        status: 'active',
        payRate: parseFloat(newEmp.payRate) || 0,
        address: newEmp.address.trim(),
        emergencyContact: newEmp.emergencyContact.trim(),
        avatar: initials,
        color: color,
        startDate: new Date().toISOString().slice(0, 10),
        clockedIn: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setShowAdd(false);
      setNewEmp({ name: '', phone: '', email: '', role: 'Cleaner', type: 'employee', payRate: '', address: '', emergencyContact: '' });
    } catch (err) {
      alert('Error adding employee: ' + err.message);
    }
    setSaving(false);
  };

  const handleDeleteEmployee = async (empId) => {
    if (!confirm('Remove this employee? They will no longer be able to sign in.')) return;
    try {
      await db.collection('employees').doc(empId).delete();
      setSelectedEmp(null);
    } catch (err) {
      alert('Error removing employee: ' + err.message);
    }
  };

  const filtered = EMPLOYEES.filter(e => {
    const matchSearch = e.name.toLowerCase().includes(search.toLowerCase());
    const matchFilter = filter === 'all' || e.type === filter || (filter === 'active' && e.status === 'active');
    return matchSearch && matchFilter;
  });

  return (
    <div>
      <div style={{ display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap' }}>
        <div className="search-bar" style={{ flex: 1, minWidth: 180 }}>
          <i className="fas fa-search" />
          <input placeholder="Search employees..." value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <select className="form-input" style={{ width: 'auto', minWidth: 120, maxWidth: 160 }} value={filter} onChange={e => setFilter(e.target.value)}>
          <option value="all">All</option>
          <option value="employee">Employees</option>
          <option value="contractor">Contractors</option>
          <option value="active">Active Only</option>
        </select>
        {role === 'admin' && (
          <button className="topbar-btn primary" onClick={() => setShowAdd(true)}><i className="fas fa-plus" /> Add</button>
        )}
      </div>

      {/* Add Employee Modal */}
      <Modal show={showAdd} onClose={() => setShowAdd(false)} title="Add Employee">
        <div className="form-group">
          <label className="form-label">Full Name *</label>
          <input className="form-input" placeholder="e.g. Maria Garcia" value={newEmp.name} onChange={e => setNewEmp({...newEmp, name: e.target.value})} />
        </div>
        <div className="form-group">
          <label className="form-label">Phone Number * <span style={{fontWeight:400,fontSize:11,color:'var(--text-light)'}}>(this is how they sign in)</span></label>
          <input className="form-input" placeholder="(555) 012-3456" value={newEmp.phone} onChange={e => setNewEmp({...newEmp, phone: e.target.value})} />
        </div>
        <div className="form-group">
          <label className="form-label">Email</label>
          <input className="form-input" placeholder="maria@email.com" value={newEmp.email} onChange={e => setNewEmp({...newEmp, email: e.target.value})} />
        </div>
        <div className="grid-2">
          <div className="form-group">
            <label className="form-label">Role</label>
            <select className="form-input" value={newEmp.role} onChange={e => setNewEmp({...newEmp, role: e.target.value})}>
              <option>Cleaner</option>
              <option>Team Lead</option>
              <option>Supervisor</option>
              <option>Admin</option>
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Type</label>
            <select className="form-input" value={newEmp.type} onChange={e => setNewEmp({...newEmp, type: e.target.value})}>
              <option value="employee">W-2 Employee</option>
              <option value="contractor">1099 Contractor</option>
            </select>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">Pay Rate ($/hr)</label>
          <input className="form-input" type="number" placeholder="18" value={newEmp.payRate} onChange={e => setNewEmp({...newEmp, payRate: e.target.value})} />
        </div>
        <div className="form-group">
          <label className="form-label">Address</label>
          <input className="form-input" placeholder="123 Main St, Austin TX" value={newEmp.address} onChange={e => setNewEmp({...newEmp, address: e.target.value})} />
        </div>
        <div className="form-group">
          <label className="form-label">Emergency Contact</label>
          <input className="form-input" placeholder="Name — Phone" value={newEmp.emergencyContact} onChange={e => setNewEmp({...newEmp, emergencyContact: e.target.value})} />
        </div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8, marginTop: 8 }}>
          <button className="topbar-btn" onClick={() => setShowAdd(false)}>Cancel</button>
          <button className="topbar-btn primary" onClick={handleAddEmployee} disabled={!newEmp.name.trim() || !newEmp.phone.trim() || saving}>
            {saving ? <><i className="fas fa-spinner fa-spin" style={{marginRight:6}}/> Saving...</> : <><i className="fas fa-plus" /> Add Employee</>}
          </button>
        </div>
      </Modal>

      {!selectedEmp ? (
        <>
        {/* Desktop table */}
        <div className="card desktop-only" style={{ padding: 0 }}>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Employee</th>
                  <th>Role</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th>Start Date</th>
                  <th>Pay Rate</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(e => (
                  <tr key={e.id}>
                    <td>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div className="avatar" style={{ background: e.color }}>{e.avatar}</div>
                        <div>
                          <div style={{ fontWeight: 600 }}>{e.name}</div>
                          <div style={{ fontSize: 12, color: 'var(--text-light)' }}>{e.email}</div>
                        </div>
                      </div>
                    </td>
                    <td>{e.role}</td>
                    <td><span className={`badge ${e.type === 'employee' ? 'blue' : 'purple'}`}>{e.type}</span></td>
                    <td><span className={`badge ${e.status === 'active' ? 'green' : e.status === 'on-leave' ? 'yellow' : 'red'}`}>{e.status}</span></td>
                    <td>{e.startDate}</td>
                    <td>${e.payRate}/hr</td>
                    <td>
                      <button className="chat-icon-btn" onClick={() => { setSelectedEmp(e); setProfileTab('info'); }}><i className="fas fa-eye" /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        {/* Mobile list — name + avatar only, tap to view */}
        <div className="mobile-only">
          {filtered.map(e => (
            <div key={e.id} className="card" onClick={() => { setSelectedEmp(e); setProfileTab('info'); }}
              style={{ padding: '12px 16px', marginBottom: 8, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div className="avatar" style={{ background: e.color, width: 36, height: 36, fontSize: 13 }}>{e.avatar}</div>
                <div style={{ fontWeight: 600, fontSize: 15 }}>{e.name}</div>
              </div>
              <i className="fas fa-chevron-right" style={{ fontSize: 12, color: 'var(--text-light)' }} />

          ))}

      ) : (
        <div>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
            <button className="topbar-btn" onClick={() => setSelectedEmp(null)}>
              <i className="fas fa-arrow-left" /> Back to List

            {role === 'admin' && (

                <i className="fas fa-trash" /> Remove

// ─── Shift Swaps ───────────────────────────────────────────────
function ShiftSwaps({ role }) {
  const [tab, setTab] = useState('pending');
  const [showRequestSwap, setShowRequestSwap] = useState(false);

  const filtered = SHIFT_SWAPS.filter(s => {
    if (tab === 'pending') return s.status === 'pending' || s.status === 'open';
    if (tab === 'approved') return s.status === 'approved';
    return true;
  });

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20, flexWrap: 'wrap', gap: 8 }}>
        <div className="tabs" style={{ marginBottom: 0 }}>
          {['pending', 'approved', 'all'].map(t => (
            <div key={t} className={`tab ${tab === t ? 'active' : ''}`} onClick={() => setTab(t)}>
              {t.charAt(0).toUpperCase() + t.slice(1)} {t === 'pending' && `(${SHIFT_SWAPS.filter(s => s.status === 'pending' || s.status === 'open').length})`}
            </div>
          ))}
        </div>
        {role === 'employee' && (
          <button className="topbar-btn primary" onClick={() => setShowRequestSwap(true)}>
            <i className="fas fa-exchange-alt" /> Swap
          </button>
        )}
      </div>

      {filtered.map(s => (
        <div className="swap-card" key={s.id}>
          <div className="swap-header">
            <div>
              <span style={{ fontWeight: 700, fontSize: 15 }}>{s.requestor}</span>
              <span className={`badge ${s.type === 'swap' ? 'blue' : 'purple'}`} style={{ marginLeft: 8 }}>
                {s.type === 'swap' ? 'Swap Request' : 'Open for Pickup'}
              </span>
            </div>
            <span className={`badge ${s.status === 'approved' ? 'green' : s.status === 'pending' ? 'yellow' : 'blue'}`}>{s.status}</span>
          </div>

function Checklists({ role }) {
  const [selectedChecklist, setSelectedChecklist] = useState(null);
  const [items, setItems] = useState({});

  const toggleItem = (listName, itemId) => {
    const key = listName;
    const current = items[key] || CHECKLISTS[listName].map(i => ({ ...i }));
    const updated = current.map(i => i.id === itemId ? { ...i, done: !i.done } : i);
    setItems({ ...items, [key]: updated });
  };

  const getItems = (name) => items[name] || CHECKLISTS[name];
  const getProgress = (name) => {
    const list = getItems(name);
    const done = list.filter(i => i.done).length;
    return Math.round((done / list.length) * 100);
  };

  return (
    <div>

                  <div style={{ textAlign: 'right' }}>
                    <div style={{ fontSize: 24, fontWeight: 700, color: getProgress(name) === 100 ? 'var(--success)' : 'var(--text)' }}>{getProgress(name)}%</div>
                    <div style={{ fontSize: 12, color: 'var(--text-light)' }}>complete</div>

// ─── App Update Button ─────────────────────────────────────────
function AppUpdateButton() {
  const [checking, setChecking] = useState(false);
  const [status, setStatus] = useState(null); // null, 'updating', 'up-to-date', 'updated'

  const checkForUpdates = async () => {
    setChecking(true);
    setStatus(null);
    try {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) {
          // Force the SW to check the server for a new version
          await reg.update();
          // If a new worker is waiting, activate it
          if (reg.waiting) {
            setStatus('updating');
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            // Reload once the new SW takes over
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
              if (!refreshing) { refreshing = true; window.location.reload(); }
            });
            // Fallback reload after 2s
            setTimeout(() => { if (!refreshing) window.location.reload(); }, 2000);
            return;
          }
          // If there's an installing worker, wait for it
          if (reg.installing) {
            setStatus('updating');
            reg.installing.addEventListener('statechange', (e) => {
              if (e.target.state === 'installed') {
                if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                setTimeout(() => window.location.reload(), 500);
              }
            });
            return;
          }
        }
        // No new SW found — clear all caches and hard reload
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        setStatus('updated');
        setTimeout(() => window.location.reload(), 800);
      } else {
        // No SW support, just clear caches and reload
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
        setStatus('updated');
        setTimeout(() => window.location.reload(), 800);
      }
    } catch (err) {
      console.error('Update check failed:', err);
      // Fallback: clear caches and reload
      try {
        const cacheNames = await caches.keys();
        await Promise.all(cacheNames.map(name => caches.delete(name)));
      } catch(e) {}
      setStatus('updated');
      setTimeout(() => window.location.reload(), 800);
    }
  };

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '8px 0' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <i className="fas fa-sync-alt" style={{ color: 'var(--primary)', fontSize: 16 }} />
        <div>
          <div style={{ fontWeight: 600, fontSize: 14 }}>Check for Updates</div>
          <div style={{ fontSize: 12, color: 'var(--text-light)' }}>
            {status === 'updating' ? 'Installing update...' : status === 'updated' ? 'Reloading...' : 'Pull the latest version of the app'}
          </div>
        </div>
      </div>
      <button className="topbar-btn primary" onClick={checkForUpdates} disabled={checking} style={{ minWidth: 80 }}>
        {checking ? <i className="fas fa-spinner fa-spin" /> : <><i className="fas fa-download" /> Update</>}
      </button>
    </div>
  );
}

// ─── Notification Settings ─────────────────────────────────────
function NotificationSettings({ userId }) {
  const defaults = {
    newMessage: true,
    channelMention: true,
    directMessage: true,
    scheduleChange: true,
    shiftReminder: true,
    swapRequest: true,
    swapApproved: true,
    newClient: false,
    clockReminder: true,
    weeklyReport: true,
    pushEnabled: (typeof Notification !== 'undefined' && Notification.permission === 'granted'),
    emailEnabled: false,
    soundEnabled: true,
    quietStart: '22:00',
    quietEnd: '07:00',
  };
  const [settings, setSettings] = useState(defaults);
  const [loaded, setLoaded] = useState(false);
  const [pushStatus, setPushStatus] = useState(
    typeof Notification !== 'undefined' ? Notification.permission : 'unsupported'
  );
  const saveTimer = useRef(null);

  // Load settings from Firestore on mount
  useEffect(() => {
    if (!userId) return;
    db.collection('employees').doc(userId).get().then((doc) => {
      const saved = (doc.exists && doc.data().notificationSettings) ? doc.data().notificationSettings : {};
      // Always reflect actual browser permission for pushEnabled
      const browserGranted = typeof Notification !== 'undefined' && Notification.permission === 'granted';
      setSettings({ ...defaults, ...saved, pushEnabled: browserGranted });
      setLoaded(true);
    }).catch(() => setLoaded(true));
  }, [userId]);

  // Auto-save to Firestore when settings change (debounced)
  useEffect(() => {
    if (!loaded || !userId) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      db.collection('employees').doc(userId).update({
        notificationSettings: settings,
      }).catch((err) => console.error('Error saving notification settings:', err));
    }, 800);
    return () => { if (saveTimer.current) clearTimeout(saveTimer.current); };
  }, [settings, loaded, userId]);

  const toggle = (key) => {
    const newVal = !settings[key];
    setSettings({ ...settings, [key]: newVal });

    // Special handling for push toggle
    if (key === 'pushEnabled' && newVal) {
      handleEnablePush();
    }
    // Play test sound when enabling sound
    if (key === 'soundEnabled' && newVal) {
      playNotificationSound();
    }
  };

  const handleEnablePush = async () => {
    if (!('Notification' in window)) {
      alert('Push notifications are not supported in this browser. Try adding this app to your Home Screen first.');
      setSettings(s => ({ ...s, pushEnabled: false }));
      return;
    }
    const token = await requestNotificationPermission(userId);
    if (token) {
      setPushStatus('granted');
    } else {
      setPushStatus(Notification.permission);
      if (Notification.permission === 'denied') {
        alert('Notifications are blocked. To enable them, go to your browser settings and allow notifications for this site.');
      }
      setSettings(s => ({ ...s, pushEnabled: false }));
    }
  };

  const Section = ({ title, children }) => (
    <div style={{ marginBottom: 24 }}>
      <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 12, color: 'var(--text-light)', textTransform: 'uppercase', letterSpacing: '0.5px' }}>{title}</h3>
      {children}
    </div>
  );

  const NotifRow = ({ icon, label, desc, settingKey }) => (
    <div className="notif-item">
      <div className="notif-info">
        <i className={`fas ${icon}`} />
        <div>
          <div style={{ fontWeight: 600, fontSize: 14 }}>{label}</div>
          <div style={{ fontSize: 12, color: 'var(--text-light)' }}>{desc}</div>
        </div>
      </div>
      <Toggle on={settings[settingKey]} onToggle={() => toggle(settingKey)} />
    </div>
  );

  return (
    <div>
      {/* Push permission banner if not yet granted */}
      {pushStatus === 'default' && (
        <div className="card" style={{ background: 'var(--primary-light)', border: '1px solid var(--primary)', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
          <i className="fas fa-bell" style={{ fontSize: 20, color: 'var(--primary)' }} />
          <div style={{ flex: 1, minWidth: 200 }}>
            <div style={{ fontWeight: 600, fontSize: 14 }}>Enable push notifications</div>
            <div style={{ fontSize: 12, color: 'var(--text-light)' }}>Get notified about schedule changes, messages, and shift swaps even when the app is closed.</div>
          </div>
          <button className="topbar-btn primary" onClick={handleEnablePush}>
            <i className="fas fa-bell" /> Enable
          </button>
        </div>
      )}

      {pushStatus === 'denied' && (
        <div className="card" style={{ background: '#fef3f2', border: '1px solid var(--danger)', marginBottom: 16 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <i className="fas fa-exclamation-triangle" style={{ color: 'var(--danger)', fontSize: 16 }} />
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>Notifications blocked</div>
              <div style={{ fontSize: 12, color: 'var(--text-light)' }}>To enable notifications, open your browser settings and allow notifications for this site.</div>
            </div>
          </div>
        </div>
      )}

      <div className="card">
        <Section title="Delivery Methods">
          <NotifRow icon="fa-mobile-alt" label="Push Notifications" desc={pushStatus === 'granted' ? 'Enabled — receiving push notifications' : 'Tap to enable push notifications'} settingKey="pushEnabled" />
          <NotifRow icon="fa-volume-up" label="Notification Sound" desc="Play a chime when notifications arrive" settingKey="soundEnabled" />
          <NotifRow icon="fa-envelope" label="Email Notifications" desc="Get email alerts for important events (coming soon)" settingKey="emailEnabled" />
        </Section>

        <Section title="Quiet Hours">
          <div style={{ display: 'flex', gap: 16, alignItems: 'center', padding: '12px 0', flexWrap: 'wrap' }}>
            <div className="form-group" style={{ margin: 0, flex: 1, minWidth: 120 }}>
              <label className="form-label">Start</label>
              <input type="time" className="form-input" value={settings.quietStart} onChange={e => setSettings({...settings, quietStart: e.target.value})} />
            </div>
            <div className="form-group" style={{ margin: 0, flex: 1, minWidth: 120 }}>
              <label className="form-label">End</label>

            </div>
          </div>
          <p style={{ fontSize: 12, color: 'var(--text-light)' }}>Notifications will be silenced during quiet hours. Urgent messages from admins will still come through.</p>
        </Section>

        <Section title="Chat">

      if (empSnap.empty) {

            color: '#4a6741',
            startDate: new Date().toISOString().slice(0, 10),
